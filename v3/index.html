<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>一夜鱼龙舞 · 乐章版 —— 按谱演出的声光雕</title>
<style>
  body{margin:0;background:#0a0b10;color:#e8eaed;font-family:system-ui,"Microsoft YaHei",sans-serif;display:flex;justify-content:center;}
  .wrap{width:min(980px,100vw);padding:16px;box-sizing:border-box;}
  h1{font-size:16px;font-weight:600;margin:0 0 10px;}
  #canvas{width:100%;height:560px;display:block;border-radius:12px;background:#000;cursor:grab;touch-action:none;}
  .row{display:flex;align-items:center;gap:12px;margin-top:10px;}
  .row label{font-size:13px;color:#9aa0a6;min-width:72px;}
  .row input{flex:1;}
  .val{font-size:13px;min-width:44px;text-align:right;}
  .btns{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;align-items:center;}
  button{background:#171a24;color:#e8eaed;border:1px solid #2b3042;border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;}
  button:hover{border-color:#4a5578;}
  button.on{background:#33406e;border-color:#5b6cc0;}
  #startBtn{background:#6e3352;border-color:#c05b8a;font-weight:600;}
  #startBtn.on{background:#33406e;}
  .hint{font-size:12px;color:#8a90a0;margin-top:10px;text-align:center;line-height:1.7;}
</style>
</head>
<body>
<div class="wrap">
  <h1>一夜鱼龙舞 · 乐章版 —— 鼓、贝斯、和弦、主旋律四轨总谱,音与形照谱同演</h1>
  <canvas id="canvas"></canvas>
  <div class="btns">
    <button id="startBtn">▶ 开始乐章</button>
    <button id="playBtn">暂停</button>
    <button id="spinBtn" class="on">自动旋转:开</button>
    <span style="flex:1"></span>
    <span style="font-size:12px;color:#8a90a0">四个乐章循环:星涡序曲 → 鱼龙行板 → 环面急板 → 球谐辉煌</span>
  </div>
  <div class="row">
    <label>曲速 BPM</label>
    <input type="range" id="bpmSlider" min="72" max="120" step="1" value="92">
    <span class="val" id="bpmOut">92</span>
  </div>
  <div class="row">
    <label>音乐音量</label>
    <input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.7">
    <span class="val" id="volOut">0.70</span>
  </div>
  <div class="row">
    <label>粒子数量</label>
    <input type="range" id="countSlider" min="2000" max="16000" step="500" value="10000">
    <span class="val" id="countOut">10000</span>
  </div>
  <div class="hint">
    这一版是"按乐谱预编排":鼓点(底鼓=粒子搏动/军鼓=闪光抖动/踩镲=微光)、贝斯走根音、和弦垫每小节换一次、主旋律的每个音符直接牵动形态参数——旋律爬高,光雕舒展;换乐章时图案、物理参数、音色一起切换,第四乐章进场自带锣声冲击波。<br>
    拖动 = 旋转视角 · 滚轮 = 缩放 · 轻点画面 = 加一记冲击波(未开始时轻点 = 直接开演)
  </div>
</div>
<script>
(function(){
  'use strict';
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const $ = id => document.getElementById(id);
  const bpmSlider=$('bpmSlider'), bpmOut=$('bpmOut');
  const volSlider=$('volSlider'), volOut=$('volOut');
  const countSlider=$('countSlider'), countOut=$('countOut');
  const startBtn=$('startBtn'), playBtn=$('playBtn'), spinBtn=$('spinBtn');

  const NMAX = 16000;
  const PI2 = Math.PI*2;

  // ── 粒子状态 ──
  const px=new Float32Array(NMAX), py=new Float32Array(NMAX), pz=new Float32Array(NMAX);
  const vx=new Float32Array(NMAX), vy=new Float32Array(NMAX), vz=new Float32Array(NMAX);
  const R1=new Float32Array(NMAX), R2=new Float32Array(NMAX), R3=new Float32Array(NMAX), R4=new Float32Array(NMAX);
  for(let i=0;i<NMAX;i++){
    R1[i]=Math.random(); R2[i]=Math.random(); R3[i]=Math.random(); R4[i]=Math.random();
    const r=2*Math.cbrt(Math.random()), th=Math.random()*PI2, ph=Math.acos(2*Math.random()-1);
    px[i]=r*Math.sin(ph)*Math.cos(th); py[i]=r*Math.cos(ph); pz[i]=r*Math.sin(ph)*Math.sin(th);
  }

  let playing=true, autoSpin=true;
  let preset=3;
  let t=0;

  // 由乐谱驱动的图形状态(目标值 + 当前值,平滑过渡)
  let xCur=0, xTarget=0;                 // 形态参数:主旋律音高牵着走
  let springCur=3.5, springT=3.5;        // 跟随力:每乐章不同
  let swirlCur=1.3, swirlT=1.3;          // 漩涡力
  let trailCur=8, trailT=8;              // 光迹
  let kickEnv=0, snareEnv=0, hatEnv=0;   // 鼓点脉冲包络
  let secLabel='', labelAlpha=0;

  // ── 摄像机 ──
  let yaw=0.7, pitch=0.32, camDist=4.3;
  let dragging=false, lastX=0, lastY=0, moved=0;

  function resize(){
    const rect=canvas.getBoundingClientRect();
    const dpr=window.devicePixelRatio||1;
    canvas.width=Math.round(rect.width*dpr);
    canvas.height=Math.round(rect.height*dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  resize();
  window.addEventListener('resize',resize);

  // ── 四套三维公式(同前两版)──
  const tgt=[0,0,0];
  function target(i,N,t,mm){
    const u=i/N;
    if(preset===0){
      const s=u*PI2;
      const cx=1.25*Math.sin(2*s+t*0.40);
      const cy=0.90*Math.sin(3*s+t*0.31)*(1+0.35*mm);
      const cz=1.25*Math.sin(4*s+t*0.27+mm*2);
      const th2=R1[i]*PI2+t*(0.4+R2[i]*0.8);
      const rt=0.05+0.17*Math.pow(Math.abs(Math.sin(s*6-t*1.5)),1.5)*(1+0.5*Math.abs(mm));
      tgt[0]=cx+rt*Math.cos(th2);
      tgt[1]=cy+rt*Math.sin(th2)*0.8;
      tgt[2]=cz+rt*Math.sin(th2+s*3);
    }else if(preset===1){
      const zn=1-2*((i+0.5)/N);
      const rxy=Math.sqrt(Math.max(0,1-zn*zn));
      const phi=i*2.39996323;
      const theta=Math.acos(zn);
      const h=3+mm*2.5, m1=Math.floor(h), fr=h-m1;
      const base=Math.sin(m1*phi+t*0.6)*(1-fr)+Math.sin((m1+1)*phi+t*0.6)*fr;
      const r=1.15*(1+0.45*base*Math.sin(4*theta-t*0.5)+0.10*Math.sin(7*theta+t*0.9));
      tgt[0]=r*rxy*Math.cos(phi);
      tgt[1]=r*zn;
      tgt[2]=r*rxy*Math.sin(phi);
    }else if(preset===2){
      const s=u*PI2;
      const q=3+mm*2;
      const R=1.05+0.42*Math.cos(q*s+t*0.6);
      const ang=2*s+t*0.25;
      const sp=0.06*(0.5+R2[i]);
      tgt[0]=1.15*R*Math.cos(ang)+sp*Math.cos(R1[i]*PI2+t);
      tgt[1]=0.72*Math.sin(q*s+t*0.6)+sp*Math.sin(R3[i]*PI2+t*1.3);
      tgt[2]=1.15*R*Math.sin(ang)+sp*Math.sin(R1[i]*PI2+t);
    }else{
      const wind=2.0+(mm+1)*1.6;
      const rr=0.15+R1[i]*R1[i]*1.9;
      const arm=Math.floor(R2[i]*3)/3*PI2;
      const ang=arm+rr*wind-t*0.35+(R3[i]-0.5)*0.55*(0.35+rr);
      tgt[0]=rr*Math.cos(ang);
      tgt[1]=(R4[i]-0.5)*0.55*Math.exp(-rr*1.3)+0.03*Math.sin(rr*8-t);
      tgt[2]=rr*Math.sin(ang);
    }
    return tgt;
  }

  // ══════════════════════════════════════════════════
  // 总谱:全曲 A 羽五声调式,四个乐章 × 每章4小节,循环演出
  // 每章写死:鼓三件套 + 贝斯 + 主旋律的 16 分音符网格,
  // 以及这一章图形该用哪个图案、哪套物理参数
  // 记谱法:'x'=击打 'o'=开镲 'R'=根音 'O'=高八度 '5'=五度 数字=音阶级数 '-'=休止
  // ══════════════════════════════════════════════════
  const SCALE=[0,3,5,7,10];                 // A 羽(小调五声)
  const ROOT=57;                            // A3
  const CHORDS=[[45,52,57,60],[41,48,53,57],[48,55,60,64],[43,50,55,57]]; // Am F C G(加九)
  const BASSROOT=[45,41,48,43];
  const SONG=[
    {label:'第一乐章 · 星涡 · 序曲',preset:3,spring:3.5,swirl:1.3,trail:8,
     reg:0,wave:'sine',cut:1800,melVel:0.20,melDur:8,padGain:0.055,hatVel:0.15,
     kick:'x---------------',
     snare:'----------------',
     hat:'----x-------x---',
     bass:'R---------------',
     mel:['4---------------','--------3-------','5-----4---------','2---------------']},
    {label:'第二乐章 · 鱼龙舞 · 行板',preset:0,spring:6,swirl:0.8,trail:4,
     reg:12,wave:'triangle',cut:2600,melVel:0.24,melDur:3,padGain:0.04,hatVel:0.2,
     kick:'x-------x-------',
     snare:'----x-------x---',
     hat:'x-x-x-x-x-x-x-x-',
     bass:'R-----R-R-----5-',
     mel:['5---4-5-7---5---','4-2-1-----2-----','5---4-5-8---7---','9-8-7-5-4-------']},
    {label:'第三乐章 · 环面绸带 · 急板',preset:2,spring:8,swirl:1.5,trail:3,
     reg:12,wave:'sawtooth',cut:1700,melVel:0.19,melDur:2,padGain:0.035,hatVel:0.1,
     kick:'x--x----x-x-----',
     snare:'----x-------x--x',
     hat:'xxxxxxxxxxxxxxxx',
     bass:'R--R----O--R--5-',
     mel:['5-7-9-7-5-7-4---','2-4-5-4-2-4-1---','5-7-8-7-5-4-2---','4-5-7-9-7-5-4-2-']},
    {label:'第四乐章 · 球谐光雕 · 辉煌',preset:1,spring:10,swirl:1.0,trail:2,
     reg:12,wave:'triangle',cut:3400,melVel:0.28,melDur:3,padGain:0.07,hatVel:0.22,
     octDouble:true,sparkle:true,shock:true,
     kick:'x---x---x---x---',
     snare:'----x-------x---',
     hat:'--o---o---o---o-',
     bass:'R-R-R-R-R-R-R-O-',
     mel:['9-------7---8---','7---5---4---5---','9-------7---8---','9-8-7-5-4-2-1---']}
  ];

  const mtof=m=>440*Math.pow(2,(m-69)/12);
  function degToMidi(root,deg){
    const oct=Math.floor(deg/SCALE.length);
    const idx=((deg%SCALE.length)+SCALE.length)%SCALE.length;
    return root+oct*12+SCALE[idx];
  }

  // ── 音频引擎 ──
  let AC=null, master=null, delaySend=null, noiseBuf=null;
  let musicOn=false;
  let nextT=0, songPos=0;
  const evq=[];   // 已排进音频时间线的"视觉事件"队列,画面到点执行

  function initAudio(){
    AC=new (window.AudioContext||window.webkitAudioContext)();
    master=AC.createGain();
    master.gain.value=parseFloat(volSlider.value);
    const comp=AC.createDynamicsCompressor();
    master.connect(comp); comp.connect(AC.destination);
    delaySend=AC.createGain(); delaySend.gain.value=0.32;
    const dly=AC.createDelay(1); dly.delayTime.value=0.27;
    const fb=AC.createGain(); fb.gain.value=0.36;
    const lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=2200;
    delaySend.connect(dly); dly.connect(fb); fb.connect(lp); lp.connect(dly);
    dly.connect(master);
    noiseBuf=AC.createBuffer(1,AC.sampleRate,AC.sampleRate);
    const d=noiseBuf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  }

  // —— 乐器 ——
  function playNote(freq,t0,vel,dur,wave,cut){   // 主旋律拨弦
    const o=AC.createOscillator(); o.type=wave; o.frequency.value=freq;
    const g=AC.createGain();
    g.gain.setValueAtTime(0,t0);
    g.gain.linearRampToValueAtTime(vel,t0+0.012);
    g.gain.exponentialRampToValueAtTime(0.0008,t0+dur);
    const f1=AC.createBiquadFilter(); f1.type='lowpass'; f1.frequency.value=cut; f1.Q.value=0.7;
    o.connect(f1); f1.connect(g); g.connect(master); g.connect(delaySend);
    o.start(t0); o.stop(t0+dur+0.05);
  }
  function bassNote(freq,t0,dur){                // 贝斯:锯齿波过低通,圆润有弹性
    const o=AC.createOscillator(); o.type='sawtooth'; o.frequency.value=freq;
    const o2=AC.createOscillator(); o2.type='sine'; o2.frequency.value=freq/2;
    const f1=AC.createBiquadFilter(); f1.type='lowpass'; f1.frequency.value=520; f1.Q.value=1.1;
    const g=AC.createGain();
    g.gain.setValueAtTime(0,t0);
    g.gain.linearRampToValueAtTime(0.20,t0+0.015);
    g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
    o.connect(f1); o2.connect(f1); f1.connect(g); g.connect(master);
    o.start(t0); o.stop(t0+dur+0.05); o2.start(t0); o2.stop(t0+dur+0.05);
  }
  function kick(t0){                             // 底鼓:正弦从 160Hz 俯冲到 42Hz
    const o=AC.createOscillator(); o.type='sine';
    o.frequency.setValueAtTime(160,t0);
    o.frequency.exponentialRampToValueAtTime(42,t0+0.11);
    const g=AC.createGain();
    g.gain.setValueAtTime(0.85,t0);
    g.gain.exponentialRampToValueAtTime(0.001,t0+0.17);
    o.connect(g); g.connect(master);
    o.start(t0); o.stop(t0+0.2);
  }
  function snare(t0){                            // 军鼓:噪声带通 + 短促鼓皮音
    const src=AC.createBufferSource(); src.buffer=noiseBuf;
    const bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1750; bp.Q.value=0.9;
    const g=AC.createGain();
    g.gain.setValueAtTime(0.42,t0);
    g.gain.exponentialRampToValueAtTime(0.001,t0+0.16);
    src.connect(bp); bp.connect(g); g.connect(master); g.connect(delaySend);
    src.start(t0); src.stop(t0+0.2);
    const o=AC.createOscillator(); o.type='triangle'; o.frequency.value=192;
    const g2=AC.createGain();
    g2.gain.setValueAtTime(0.28,t0);
    g2.gain.exponentialRampToValueAtTime(0.001,t0+0.08);
    o.connect(g2); g2.connect(master);
    o.start(t0); o.stop(t0+0.1);
  }
  function hat(t0,open,vel){                     // 踩镲:高通噪声,闭/开两种长度
    const src=AC.createBufferSource(); src.buffer=noiseBuf;
    src.playbackRate.value=1.4;
    const hp=AC.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=7400;
    const g=AC.createGain();
    g.gain.setValueAtTime(vel,t0);
    g.gain.exponentialRampToValueAtTime(0.001,t0+(open?0.28:0.045));
    src.connect(hp); hp.connect(g); g.connect(master);
    src.start(t0); src.stop(t0+0.32);
  }
  function pad(chord,t0,dur,gain){               // 和弦垫:每小节铺一层
    for(let k=0;k<chord.length;k++){
      const f=mtof(chord[k]);
      for(let dt2 of [0,0.13]){
        const o=AC.createOscillator(); o.type='triangle';
        o.frequency.value=f*(dt2?1.003:1);
        const lp2=AC.createBiquadFilter(); lp2.type='lowpass'; lp2.frequency.value=1150;
        const g=AC.createGain();
        g.gain.setValueAtTime(0,t0);
        g.gain.linearRampToValueAtTime(gain,t0+0.35);
        g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
        o.connect(lp2); lp2.connect(g); g.connect(master);
        o.start(t0); o.stop(t0+dur+0.1);
      }
    }
  }
  function gongAt(t0){                           // 锣 + 下行音阶(第四乐章进场/冲击波)
    const src=AC.createBufferSource(); src.buffer=noiseBuf;
    const bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=1.2;
    bp.frequency.setValueAtTime(950,t0);
    bp.frequency.exponentialRampToValueAtTime(160,t0+1.1);
    const g=AC.createGain();
    g.gain.setValueAtTime(0.5,t0);
    g.gain.exponentialRampToValueAtTime(0.001,t0+1.3);
    src.connect(bp); bp.connect(g); g.connect(master); g.connect(delaySend);
    src.start(t0); src.stop(t0+1.4);
    const o=AC.createOscillator(); o.type='sine';
    o.frequency.setValueAtTime(84,t0);
    o.frequency.exponentialRampToValueAtTime(45,t0+1.2);
    const g2=AC.createGain();
    g2.gain.setValueAtTime(0.3,t0);
    g2.gain.exponentialRampToValueAtTime(0.001,t0+1.4);
    o.connect(g2); g2.connect(master);
    o.start(t0); o.stop(t0+1.5);
    for(let k=0;k<5;k++){
      playNote(mtof(degToMidi(ROOT+12,9-k*2)),t0+0.06+k*0.085,0.16,0.5,'triangle',3400);
    }
  }

  function ev(t0,type,data){ evq.push({t:t0,type:type,data:data}); }

  // 按总谱排一步(一个 16 分音符):该响的乐器排上,对应的视觉事件同刻入队
  function playStep(pos,t0,dt16){
    const secIdx=Math.floor(pos/64)%SONG.length;
    const sec=SONG[secIdx];
    const bar=Math.floor(pos/16)%4, s=pos%16;
    if(s===0&&bar===0){
      ev(t0,'section',secIdx);
      if(sec.shock){ gongAt(t0); ev(t0,'shock'); }
    }
    if(s===0) pad(CHORDS[bar],t0,dt16*15.5,sec.padGain);
    if(sec.kick[s]==='x'){ kick(t0); ev(t0,'kick'); }
    if(sec.snare[s]==='x'){ snare(t0); ev(t0,'snare'); }
    const hc=sec.hat[s];
    if(hc==='x'||hc==='o'){ hat(t0,hc==='o',sec.hatVel); ev(t0,'hat'); }
    const bc=sec.bass[s];
    if(bc==='R'||bc==='O'||bc==='5'){
      const rm=BASSROOT[bar]+(bc==='O'?12:bc==='5'?7:0);
      bassNote(mtof(rm),t0,dt16*3.2);
    }
    const mc=sec.mel[bar][s];
    if(mc!=='-'){
      const deg=mc.charCodeAt(0)-48;
      const m=degToMidi(ROOT+sec.reg,deg);
      playNote(mtof(m),t0,sec.melVel,dt16*sec.melDur,sec.wave,sec.cut);
      if(sec.octDouble) playNote(mtof(m+12),t0,sec.melVel*0.4,dt16*2,'sine',6000);
      ev(t0,'note',deg);
    }
    if(sec.sparkle&&s%2===1&&Math.random()<0.3){
      playNote(mtof(degToMidi(ROOT+24,5+((Math.random()*5)|0))),t0,0.06,0.22,'sine',5600);
    }
  }

  // 前瞻式调度器
  setInterval(function(){
    if(!musicOn||!AC) return;
    if(!playing||document.hidden){ nextT=AC.currentTime+0.15; return; }
    const bpm=parseFloat(bpmSlider.value);
    const dt16=60/bpm/4;
    while(nextT<AC.currentTime+0.15){
      playStep(songPos,nextT,dt16);
      nextT+=dt16; songPos++;
    }
  },25);

  // 视觉事件到点执行:音画在同一根音频时钟上对齐
  function applyEvents(){
    if(!AC) return;
    const now=AC.currentTime+0.008;
    while(evq.length&&evq[0].t<=now){
      const e=evq.shift();
      if(e.type==='kick') kickEnv=1;
      else if(e.type==='snare'){ snareEnv=1; jitter(0.45); }
      else if(e.type==='hat') hatEnv=1;
      else if(e.type==='note') xTarget=-60+e.data*(120/9);
      else if(e.type==='shock') shockwave(0.85);
      else if(e.type==='section') applySection(e.data);
    }
  }
  function applySection(idx){
    const sec=SONG[idx];
    preset=sec.preset;
    springT=sec.spring; swirlT=sec.swirl; trailT=sec.trail;
    secLabel=sec.label; labelAlpha=1;
  }
  applySection(0);   // 未开演时也摆好第一乐章的姿势

  function jitter(a){
    const N=parseInt(countSlider.value,10);
    for(let i=0;i<N;i++){
      vx[i]+=(R2[i]-0.5)*a; vy[i]+=(R3[i]-0.5)*a; vz[i]+=(R4[i]-0.5)*a;
    }
  }
  function shockwave(k){
    const N=parseInt(countSlider.value,10);
    for(let i=0;i<N;i++){
      const d=Math.sqrt(px[i]*px[i]+py[i]*py[i]+pz[i]*pz[i])+1e-4;
      const imp=k*3.2/(0.45+d*d);
      vx[i]+=px[i]/d*imp+(R1[i]-0.5)*0.6*k;
      vy[i]+=py[i]/d*imp+(R2[i]-0.5)*0.6*k;
      vz[i]+=pz[i]/d*imp+(R3[i]-0.5)*0.6*k;
    }
  }

  // ── 交互 ──
  bpmSlider.addEventListener('input',()=>{bpmOut.textContent=bpmSlider.value;});
  volSlider.addEventListener('input',()=>{
    volOut.textContent=parseFloat(volSlider.value).toFixed(2);
    if(master) master.gain.value=parseFloat(volSlider.value);
  });
  countSlider.addEventListener('input',()=>{countOut.textContent=countSlider.value;});

  function startSong(){
    if(!AC) initAudio();
    if(AC.state==='suspended') AC.resume();
    musicOn=!musicOn;
    if(musicOn){
      songPos=0; evq.length=0;
      nextT=AC.currentTime+0.15;
      applySection(0);
    }
    startBtn.textContent=musicOn?'■ 停止乐章':'▶ 开始乐章';
    startBtn.classList.toggle('on',musicOn);
  }
  startBtn.addEventListener('click',startSong);
  playBtn.addEventListener('click',()=>{
    playing=!playing;
    playBtn.textContent=playing?'暂停':'播放';
  });
  spinBtn.addEventListener('click',()=>{
    autoSpin=!autoSpin;
    spinBtn.textContent='自动旋转:'+(autoSpin?'开':'关');
    spinBtn.classList.toggle('on',autoSpin);
  });

  canvas.addEventListener('pointerdown',e=>{
    dragging=true; moved=0;
    lastX=e.clientX; lastY=e.clientY;
    canvas.setPointerCapture(e.pointerId);
    canvas.style.cursor='grabbing';
  });
  canvas.addEventListener('pointermove',e=>{
    if(!dragging) return;
    const dx=e.clientX-lastX, dy=e.clientY-lastY;
    moved+=Math.abs(dx)+Math.abs(dy);
    yaw+=dx*0.0055;
    pitch=Math.max(-1.45,Math.min(1.45,pitch+dy*0.0055));
    lastX=e.clientX; lastY=e.clientY;
  });
  canvas.addEventListener('pointerup',()=>{
    dragging=false;
    canvas.style.cursor='grab';
    if(moved<6){
      if(!musicOn){ startSong(); }
      else{ shockwave(1); if(AC) gongAt(AC.currentTime); }
    }
  });
  canvas.addEventListener('wheel',e=>{
    e.preventDefault();
    camDist=Math.max(1.8,Math.min(9,camDist*Math.exp(e.deltaY*0.0012)));
  },{passive:false});

  // ── 颜色缓存 ──
  const colorCache=Object.create(null);
  function col(h,l){
    h=((h|0)%360+360)%360; h-=h%4;
    l=l|0; l-=l%5;
    const k=h*100+l;
    let c=colorCache[k];
    if(!c){c='hsla('+h+',100%,'+l+'%,0.9)'; colorCache[k]=c;}
    return c;
  }

  // ── 主循环 ──
  let last=performance.now();
  function loop(now){
    const dtms=Math.min(now-last,50);
    last=now;
    const sdt=dtms*0.001;
    const N=parseInt(countSlider.value,10);
    const bpm=parseFloat(bpmSlider.value);

    applyEvents();

    // 包络衰减(鼓点的视觉余韵)
    kickEnv*=Math.exp(-9*sdt);
    snareEnv*=Math.exp(-7*sdt);
    hatEnv*=Math.exp(-18*sdt);
    labelAlpha=Math.max(0.5,labelAlpha-sdt*0.4);

    // 图形参数向乐谱给的目标平滑靠拢
    xCur+=(xTarget-xCur)*Math.min(1,4*sdt);
    springCur+=(springT-springCur)*Math.min(1,1.5*sdt);
    swirlCur+=(swirlT-swirlCur)*Math.min(1,1.5*sdt);
    trailCur+=(trailT-trailCur)*Math.min(1,1.5*sdt);

    if(playing){
      const tdt=sdt*(bpm/92);     // 图形流速与曲速同步
      t+=tdt;
      if(autoSpin&&!dragging) yaw+=tdt*0.12;

      const mm=xCur/60;
      const springK=springCur*6;
      const damp=Math.exp(-4.2*sdt);

      for(let i=0;i<N;i++){
        const g=target(i,N,t,mm);
        vx[i]=(vx[i]+(g[0]-px[i])*springK*sdt+(-pz[i])*swirlCur*sdt)*damp;
        vy[i]=(vy[i]+(g[1]-py[i])*springK*sdt)*damp;
        vz[i]=(vz[i]+(g[2]-pz[i])*springK*sdt+( px[i])*swirlCur*sdt)*damp;
        px[i]+=vx[i]*sdt; py[i]+=vy[i]*sdt; pz[i]+=vz[i]*sdt;
        if(px[i]*px[i]+py[i]*py[i]+pz[i]*pz[i]>1600){ px[i]=g[0]; py[i]=g[1]; pz[i]=g[2]; vx[i]=vy[i]=vz[i]=0; }
      }
    }

    // 绘制
    const rect=canvas.getBoundingClientRect();
    const w=rect.width, h=rect.height;
    const trailAlpha=0.5/Math.max(1,trailCur);
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle='rgba(0,0,0,'+trailAlpha.toFixed(3)+')';
    ctx.fillRect(0,0,w,h);
    ctx.globalCompositeOperation='lighter';

    const cy_=Math.cos(yaw), sy_=Math.sin(yaw);
    const cp_=Math.cos(pitch), sp_=Math.sin(pitch);
    const fov=Math.min(w,h)*1.05;
    const cxs=w/2, cys=h/2;
    const sizeMul=1+0.3*kickEnv;
    const lightAdd=11*snareEnv+4*hatEnv;
    const hueShift=38*snareEnv;
    const camD=camDist*(1-0.028*kickEnv);   // 底鼓时镜头轻轻一顿

    for(let i=0;i<N;i++){
      const x1=cy_*px[i]+sy_*pz[i];
      const z1=-sy_*px[i]+cy_*pz[i];
      const y2=cp_*py[i]-sp_*z1;
      const zc=sp_*py[i]+cp_*z1+camD;
      if(zc<0.15) continue;
      const f=fov/zc;
      const sx=cxs+x1*f, syy=cys-y2*f;
      if(sx<-4||sx>w+4||syy<-4||syy>h+4) continue;
      const spd=Math.abs(vx[i])+Math.abs(vy[i])+Math.abs(vz[i]);
      const hue=(preset===3
        ? Math.sqrt(px[i]*px[i]+pz[i]*pz[i])*130
        : (i/N)*300)+t*24+spd*18+hueShift;
      const light=Math.max(42,Math.min(82, 30+130/zc+spd*9+lightAdd));
      const size=Math.max(0.7,Math.min(3.6,4.6/zc*sizeMul));
      ctx.fillStyle=col(hue,light);
      ctx.fillRect(sx,syy,size,size);
    }

    // 乐章标题 / 开演提示
    ctx.globalCompositeOperation='source-over';
    if(musicOn&&secLabel){
      ctx.font='500 15px system-ui,"Microsoft YaHei",sans-serif';
      ctx.fillStyle='rgba(225,232,255,'+labelAlpha.toFixed(2)+')';
      ctx.textAlign='left';
      ctx.fillText(secLabel,16,h-16);
    }else if(!musicOn){
      ctx.font='600 17px system-ui,"Microsoft YaHei",sans-serif';
      ctx.fillStyle='rgba(225,232,255,0.55)';
      ctx.textAlign='center';
      ctx.fillText('▶ 轻点画面,乐章开演',w/2,h-24);
    }

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
