<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>一夜鱼龙舞 · 咒成</title>
<style>
@font-face{font-family:CJKFallback;src:local('Microsoft YaHei'),local('微软雅黑'),local('PingFang SC'),local('苹方-简'),local('Noto Sans CJK SC'),local('Noto Sans SC'),local('Source Han Sans SC'),local('思源黑体'),local('WenQuanYi Micro Hei'),local('文泉驿微米黑'),local('SimHei'),local('黑体')}
body{margin:0;background:#08080c;color:#d4c8a0;font-family:system-ui,CJKFallback,'Microsoft YaHei',sans-serif;display:flex;justify-content:center;height:100vh;overflow:hidden}
.wrap{width:100vw;height:100vh;display:flex;flex-direction:column;position:relative}
h1{position:absolute;top:12px;left:16px;font-size:13px;font-weight:400;margin:0;color:#6a5f4a;z-index:2;letter-spacing:.18em}
#canvas{flex:1;display:block;background:#08080c;cursor:grab;touch-action:none}
#canvas:active{cursor:grabbing}
#runeOverlay{position:absolute;top:40px;right:20px;font-size:48px;opacity:0;transition:opacity .4s;z-index:2;text-shadow:0 0 18px currentColor}
#spellInputWrap{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;z-index:2}
#spellInput{background:rgba(10,9,14,.92);color:#d4c8a0;border:1px solid #4a4028;border-radius:6px;padding:10px 16px;font-size:15px;width:160px;outline:none;font-family:CJKFallback,'Microsoft YaHei',sans-serif;letter-spacing:.12em;transition:border-color .25s}
#spellInput:focus{border-color:#a08040}
#spellInput::placeholder{color:#4a4028;letter-spacing:.08em}
#castBtn{background:rgba(20,18,14,.92);color:#c8a840;border:1px solid #5a4a28;border-radius:6px;padding:10px 20px;font-size:14px;cursor:pointer;font-family:CJKFallback,'Microsoft YaHei',sans-serif;letter-spacing:.15em;transition:all .25s}
#castBtn:hover{border-color:#a08040;background:rgba(30,26,18,.95)}
#castBtn:active{background:rgba(45,35,18,.95)}
#historyList{position:absolute;bottom:80px;left:20px;display:flex;flex-direction:column-reverse;gap:6px;z-index:2;font-size:13px}
.histItem{color:#6a5f4a;opacity:.7;transition:opacity .6s;font-family:CJKFallback,'Microsoft YaHei',sans-serif;letter-spacing:.08em}
.histItem.new{opacity:.95;color:#c8a840}
#controls{position:absolute;bottom:24px;right:20px;display:flex;gap:12px;align-items:center;z-index:2}
#controls button{background:rgba(10,9,14,.85);color:#6a5f4a;border:1px solid #2a2214;border-radius:4px;padding:5px 10px;font-size:11px;cursor:pointer;transition:all .2s}
#controls button:hover{border-color:#4a4028;color:#8a7f5a}
#controls button.on{color:#c8a840;border-color:#5a4a28}
#particleInfo{position:absolute;top:12px;right:20px;font-size:11px;color:#4a4028;z-index:2}
.flyText{position:fixed;font-size:48px;color:#d4c8a0;font-family:CJKFallback,'Microsoft YaHei',sans-serif;pointer-events:none;z-index:10;transition:all .5s cubic-bezier(.22,.61,.36,1);opacity:1;text-shadow:0 0 30px rgba(200,168,64,.6)}
.flyText.go{transform:scale(3.5);opacity:0;text-shadow:0 0 80px rgba(200,168,64,.9)}
#flashOverlay{position:fixed;top:0;left:0;width:100vw;height:100vh;background:#fff;opacity:0;pointer-events:none;z-index:5;transition:opacity .04s}
</style></head><body>
<div id="flashOverlay"></div>
<div class="wrap">
<h1>一夜鱼龙舞 · 咒成</h1>
<div id="runeOverlay"></div>
<canvas id="canvas"></canvas>
<div id="particleInfo">✦ 8000</div>
<div id="spellInputWrap">
<input type="text" id="spellInput" maxlength="6" placeholder="输入咒语…" value="炎咒">
<button id="castBtn">施咒 ✦</button>
</div>
<div id="historyList"></div>
<div id="controls">
<button id="pauseBtn">暂停</button>
<button id="spinBtn" class="on">旋转</button>
<input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.6" title="音量" style="width:60px;accent-color:#a08040">
<div style="color:#4a4028;font-size:10px">粒子</div>
<input type="range" id="countSlider" min="2000" max="16000" step="500" value="8000" style="width:50px;accent-color:#a08040">
</div>
</div>
<script>
(function(){
'use strict';
var canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
var $=function(id){return document.getElementById(id);};
var spellInput=$('spellInput'),castBtn=$('castBtn'),runeOverlay=$('runeOverlay');
var historyList=$('historyList'),flashOverlay=$('flashOverlay'),particleInfo=$('particleInfo');
var pauseBtn=$('pauseBtn'),spinBtn=$('spinBtn'),volSlider=$('volSlider'),countSlider=$('countSlider');
var NMAX=16000,PI2=Math.PI*2;
var FONT_STACK='"CJKFallback","Microsoft YaHei","PingFang SC","Noto Sans CJK SC","Noto Sans SC","WenQuanYi Micro Hei","SimHei",sans-serif';
var STATUS_FONT='system-ui,'+FONT_STACK;
var px=new Float32Array(NMAX),py=new Float32Array(NMAX),pz=new Float32Array(NMAX);
var vx=new Float32Array(NMAX),vy=new Float32Array(NMAX),vz=new Float32Array(NMAX);
var R1=new Float32Array(NMAX),R2=new Float32Array(NMAX),R3=new Float32Array(NMAX),R4=new Float32Array(NMAX);
for(var i=0;i<NMAX;i++){R1[i]=Math.random();R2[i]=Math.random();R3[i]=Math.random();R4[i]=Math.random();var r=2*Math.cbrt(Math.random()),th=Math.random()*PI2,ph=Math.acos(Math.random()*2-1);px[i]=r*Math.sin(ph)*Math.cos(th);py[i]=r*Math.cos(ph);pz[i]=r*Math.sin(ph)*Math.sin(th);}
var playing=true,autoSpin=true,t=0,springCur=3.5,swirlCur=1.3,fontMissingWarn=false;
var Mrand=function(s){return (Math.random()-0.5)*s;};
function easeInOutCubic(t){return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
function lerp(a,b,t){return a+(b-a)*t;}
function capSdt(dtms){return Math.min(dtms*0.001,0.04);}

// ----- 文字锚点 -----
var textCanvas=document.createElement('canvas');textCanvas.width=1024;textCanvas.height=256;
var textCtx=textCanvas.getContext('2d');
function genTextAnchors(N,text){
  var w=1024,h=256,tc=textCtx;tc.clearRect(0,0,w,h);tc.fillStyle='#000';tc.fillRect(0,0,w,h);tc.fillStyle='#fff';
  var fs=220;tc.font='bold '+fs+'px '+FONT_STACK;tc.textAlign='center';tc.textBaseline='middle';
  var m=tc.measureText(text);if(m.width>w*0.9)fs=Math.floor(fs*w*0.9/m.width);
  tc.font='bold '+fs+'px '+FONT_STACK;m=tc.measureText(text);tc.fillText(text,w/2,h/2);
  var imgData=tc.getImageData(0,0,w,h).data,bright=[];
  for(var y=0;y<h;y++)for(var x=0;x<w;x++)if(imgData[(y*w+x)*4]>190)bright.push([x,y]);
  var a=new Float32Array(N*3);
  if(bright.length<50){fontMissingWarn=true;for(var ij=0;ij<N;ij++){var th2=Math.random()*PI2,ph2=Math.acos(Math.random()*2-1),r2=1+Math.random()*0.2;j3=ij*3;a[j3]=r2*Math.sin(ph2)*Math.cos(th2);a[j3+1]=r2*Math.cos(ph2);a[j3+2]=r2*Math.sin(ph2)*Math.sin(th2);}return a;}
  fontMissingWarn=false;var scale=1.4/h,zDepth=0.28,nLayers=5,perLayer=Math.floor(N/nLayers);
  for(var layer=0;layer<nLayers;layer++){var zOff=(layer/(nLayers-1)-0.5)*zDepth;for(var ik=layer*perLayer,ee=(layer===nLayers-1?N:(layer+1)*perLayer);ik<ee;ik++){var bp_=bright[Math.floor(Math.random()*bright.length)],j4=ik*3;a[j4]=(bp_[0]-w/2)*scale+Mrand(0.008);a[j4+1]=(h/2-bp_[1])*scale+Mrand(0.006);a[j4+2]=zOff+Mrand(0.012);}}
  for(var il=N-1;il>0;il--){var ri=Math.floor(Math.random()*(il+1)),j0=il*3,j1=ri*3,tmp=a[j0];a[j0]=a[j1];a[j1]=tmp;tmp=a[j0+1];a[j0+1]=a[j1+1];a[j1+1]=tmp;tmp=a[j0+2];a[j0+2]=a[j1+2];a[j1+2]=tmp;}
  return a;
}

// ----- 粒子公式 -----
function target(i,N,t){
  var u=i/N,rr=.15+R1[i]*R1[i]*1.9,arm=Math.floor(R2[i]*3)/3*PI2,ang=arm+rr*6-t*.35+(R3[i]-.5)*.275;
  return[rr*Math.cos(ang),(R4[i]-.5)*.55*Math.exp(-rr*1.3)+.03*Math.sin(rr*8-t),rr*Math.sin(ang)];
}

// ----- 咒语系统 -----
var SPELL_FAMILIES={
  fire:{kw:'裂炎焚爆灼烬赤火烧焰fire flame burn blast'.split(' '),rune:'△',hue:[0,40],pri:6,chr:1.2,clr:'#e06030'},
  earth:{kw:'盾壁镇固磐山界御守earth shield wall guard'.split(' '),rune:'□',hue:[35,65],pri:5,chr:1.2,clr:'#c89040'},
  water:{kw:'愈生春息润流清疗复water heal flow cure'.split(' '),rune:'○',hue:[170,210],pri:4,chr:1.2,clr:'#40a0c0'},
  wind:{kw:'幻梦迷隐镜影花雾wind dream mirror mist'.split(' '),rune:'≈',hue:[260,300],pri:3,chr:1.2,clr:'#8060c0'},
  thunder:{kw:'雷霆电闪亟碎霹雳thunder lightning bolt shock'.split(' '),rune:'⚡',hue:[45,60],pri:8,chr:0.2,clr:'#e8d840'},
  forbidden:{kw:'灭无空寂终零void null end zero'.split(' '),rune:'✕',hue:[0,360],pri:10,chr:1.5,clr:'#404040'}
};
var FAM_NAMES={fire:'火·烈',earth:'土·镇',water:'水·愈',wind:'风·幻',thunder:'雷·霆',forbidden:'禁忌·灭'};
function classifySpell(text){
  var best=null;
  for(var k in SPELL_FAMILIES){var f=SPELL_FAMILIES[k];for(var i=0;i<f.kw.length;i++){if(text.indexOf(f.kw[i])>=0&&(!best||f.pri>best.pri)){best={family:k,spellInfo:f};break;}}}
  if(best){best.rune=best.spellInfo.rune;best.hue=best.spellInfo.hue;best.pri=best.spellInfo.pri;best.chr=best.spellInfo.chr;best.clr=best.spellInfo.clr;return best;}
  return {family:'wind',spellInfo:SPELL_FAMILIES.wind,rune:'≈',hue:[260,300],pri:3,chr:1.2,clr:'#8060c0'};
}

// ----- 状态机 -----
var SP_IDLE=0,SP_CHARGING=1,SP_CAST=2,SP_EFFECT=3,SP_FADE=4;
var spState=SP_IDLE,spTimer=0,spFamily=null,spLabel='',spAnchorCache=null,spBlend=0;
var spChargingDur=1.2,spEffectDur=5,spFadeDur=1.5;
var windMirror=null,windUseMirror=false,windSwitch=0;
var thunderFlashTimer=0,thunderA=0,thunderB=0,thunderFlashOn=false;
var forPhase=0,forTimer=0;
var spellHue=null,anchorCX=0,anchorCY=0,anchorCZ=0;
var curSpellSdt=0,curSBlend=0,curSpellPlaying=false,curAnchors=null,curCacheLen=0;

function castSpell(text,N){
  spFamily=classifySpell(text);spLabel=text;spChargingDur=spFamily.chr;
  spState=SP_CHARGING;spTimer=spChargingDur;spBlend=0;spellHue=spFamily.hue;
  windMirror=null;windUseMirror=false;windSwitch=0;thunderFlashTimer=0;thunderFlashOn=false;forPhase=0;forTimer=0;
  spAnchorCache=genTextAnchors(N,text);anchorCX=0;anchorCY=0;anchorCZ=0;
  if(spAnchorCache){for(var i=0;i<N*3;i+=3){anchorCX+=spAnchorCache[i];anchorCY+=spAnchorCache[i+1];anchorCZ+=spAnchorCache[i+2];}anchorCX/=N;anchorCY/=N;anchorCZ/=N;}
  if(spFamily.family==='wind'){windMirror=new Float32Array(N*3);for(var j=0;j<N;j++){var k=j*3;windMirror[k]=-spAnchorCache[k];windMirror[k+1]=spAnchorCache[k+1];windMirror[k+2]=spAnchorCache[k+2];}}
  runeOverlay.textContent=spFamily.rune;runeOverlay.style.color=spFamily.clr;runeOverlay.style.opacity='1';
  addHistory(spLabel,spFamily.rune,spFamily.clr);camAlive=true;camPreYaw=yaw;camPrePitch=pitch;camYawT=0;camPitchT=0.15;
  scheduleSpellCastBurst();
}
function addHistory(text,rune,color){
  var div=document.createElement('div');div.className='histItem new';div.style.color=color;div.textContent=rune+' '+text;
  historyList.appendChild(div);if(historyList.children.length>3)historyList.children[0].remove();
  setTimeout(function(){div.classList.remove('new');},3000);
  for(var i=0;i<historyList.children.length-1;i++)historyList.children[i].style.opacity='0.35';
}

// ----- 音频引擎 -----
var AC=null,master=null,delaySend=null,noiseBuf=null,audioInited=false,nextAudioT=0,audioBeat=0;
var padGainBase=.025,padGainCur=.025,padGainNode=null,kickDC=.5,hatDC=.125,delayFB=.36,delayFBC=.36,muteSpell=false;
function initAudio(){
  AC=new (window.AudioContext||window.webkitAudioContext)();master=AC.createGain();master.gain.value=parseFloat(volSlider.value);
  var comp=AC.createDynamicsCompressor();master.connect(comp);comp.connect(AC.destination);
  delaySend=AC.createGain();delaySend.gain.value=.25;
  var dly=AC.createDelay(1);dly.delayTime.value=.28;var fb=AC.createGain();fb.gain.value=.36;var lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=2200;
  delaySend.connect(dly);dly.connect(fb);fb.connect(lp);lp.connect(dly);dly.connect(master);
  padGainNode=AC.createGain();padGainNode.gain.value=padGainCur;padGainNode.connect(master);padGainNode.connect(delaySend);
  noiseBuf=AC.createBuffer(1,AC.sampleRate,AC.sampleRate);var d=noiseBuf.getChannelData(0);for(var ii=0;ii<d.length;ii++)d[ii]=Math.random()*2-1;
  audioInited=true;nextAudioT=AC.currentTime+.1;
}
function ensureAudio(){if(!AC)initAudio();if(AC.state==='suspended')AC.resume();}
var mtof=function(m){return 440*Math.pow(2,(m-69)/12);};
function kk(t0){if(!AC||muteSpell)return;var o=AC.createOscillator();o.type='sine';o.frequency.setValueAtTime(160,t0);o.frequency.exponentialRampToValueAtTime(42,t0+.11);var g=AC.createGain();g.gain.setValueAtTime(.75,t0);g.gain.exponentialRampToValueAtTime(.001,t0+.17);o.connect(g);g.connect(master);o.start(t0);o.stop(t0+.2);}
function hh(t0,open,vel){if(!AC||muteSpell)return;var src=AC.createBufferSource();src.buffer=noiseBuf;src.playbackRate.value=1.4;var hp=AC.createBiquadFilter();hp.type='highpass';hp.frequency.value=7400;var g=AC.createGain();g.gain.setValueAtTime(vel,t0);g.gain.exponentialRampToValueAtTime(.001,t0+(open?.28:.045));src.connect(hp);hp.connect(g);g.connect(master);src.start(t0);src.stop(t0+.32);}
function padNote(t0,freq,gain,dur){if(!AC||muteSpell)return;var o=AC.createOscillator();o.type='triangle';o.frequency.value=freq;var lp2=AC.createBiquadFilter();lp2.type='lowpass';lp2.frequency.value=1100;var g=AC.createGain();g.gain.setValueAtTime(0,t0);g.gain.linearRampToValueAtTime(gain,t0+.3);g.gain.exponentialRampToValueAtTime(.001,t0+dur);o.connect(lp2);lp2.connect(g);g.connect(padGainNode);o.start(t0);o.stop(t0+dur+.1);}

function scheduleSpellCastBurst(){
  if(!AC||AC.state==='suspended')return;var t0=AC.currentTime+spChargingDur;var f=spFamily.family;
  if(f==='fire'){var src=AC.createBufferSource();src.buffer=noiseBuf;var bp=AC.createBiquadFilter();bp.type='bandpass';bp.frequency.value=3000;bp.Q.value=.5;var g=AC.createGain();g.gain.setValueAtTime(.35,t0);g.gain.exponentialRampToValueAtTime(.001,t0+.15);src.connect(bp);bp.connect(g);g.connect(master);src.start(t0);src.stop(t0+.2);}
  else if(f==='earth'){var o=AC.createOscillator();o.type='sine';o.frequency.setValueAtTime(42,t0);o.frequency.linearRampToValueAtTime(38,t0+.3);var g2=AC.createGain();g2.gain.setValueAtTime(.3,t0);g2.gain.exponentialRampToValueAtTime(.001,t0+.3);o.connect(g2);g2.connect(master);o.start(t0);o.stop(t0+.35);}
  else if(f==='water'){var frs=[523,659,784];for(var k=0;k<3;k++){var ow=AC.createOscillator();ow.type='triangle';ow.frequency.value=frs[k];var gw=AC.createGain();gw.gain.setValueAtTime(0,t0+k*.06);gw.gain.linearRampToValueAtTime(.12,t0+k*.06+.25);gw.gain.exponentialRampToValueAtTime(.001,t0+k*.06+.8);ow.connect(gw);gw.connect(delaySend);ow.start(t0+k*.06);ow.stop(t0+k*.06+.85);}}
  else if(f==='wind'){delayFBC=.7;setTimeout(function(){delayFBC=.36;},1200);}
  else if(f==='thunder'){var ot=AC.createOscillator();ot.type='sawtooth';ot.frequency.setValueAtTime(500,t0);ot.frequency.exponentialRampToValueAtTime(8000,t0+.08);var gt=AC.createGain();gt.gain.setValueAtTime(.25,t0);gt.gain.exponentialRampToValueAtTime(.001,t0+.08);ot.connect(gt);gt.connect(master);ot.start(t0);ot.stop(t0+.1);}
  else if(f==='forbidden'){muteSpell=true;setTimeout(function(){muteSpell=false;if(AC){var of=AC.createOscillator();of.type='sine';of.frequency.value=30;var gf=AC.createGain();gf.gain.setValueAtTime(.0001,AC.currentTime);gf.gain.linearRampToValueAtTime(.2,AC.currentTime+3);of.connect(gf);gf.connect(master);of.start();setTimeout(function(){gf.gain.exponentialRampToValueAtTime(.001,AC.currentTime+1.5);setTimeout(function(){of.stop();},1600);},3000);}},2500);}}

// ----- 音频循环 -----
var CHORD_SEQ=[[57,60,64],[53,57,60],[60,64,67],[55,59,62]];
setInterval(function(){
  if(!AC||!audioInited||!playing||document.hidden){nextAudioT=AC.currentTime+.1;return;}
  ensureAudio();var now=AC.currentTime;if(nextAudioT<now+.08)nextAudioT=now+.08;var beat=.75;
  while(nextAudioT<now+.2){var rel=audioBeat%16,bar=Math.floor(audioBeat/4)%4;
    if(Math.random()<((rel%4===0||rel%4===2)?kickDC:0))kk(nextAudioT);
    if(Math.random()<hatDC)hh(nextAudioT,false,.08+hatDC*.5);
    if(rel===0){var ch=CHORD_SEQ[bar%4];for(var ii=0;ii<ch.length;ii++)padNote(nextAudioT,mtof(ch[ii]),padGainCur*.25,beat*15.5);}
    if(delaySend){delaySend.gain.value+=((.22+delayFBC*.4)-delaySend.gain.value)*.08;
      if(padGainNode){padGainCur+=(padGainBase-padGainCur)*.05;padGainNode.gain.value=padGainCur;}}
    nextAudioT+=beat;audioBeat++;}
},35);

// ----- 后效: 火 -----
function applyFire(N,sdt,anc){
  for(var i=1;i<N;i+=2){if(Math.random()<.015*sdt*60){var th=Math.random()*6.2832,ph=Math.acos(Math.random()*2-1),spd=.3+Math.random()*1.5;vx[i]-=Math.sin(ph)*Math.cos(th)*spd;vy[i]-=Math.sin(ph)*Math.sin(th)*spd;vz[i]+=Math.cos(ph)*spd;}
    var j=i*3,dx=px[i]-anc[j],dy=py[i]-anc[j+1],dz=pz[i]-anc[j+2];if(dx*dx+dy*dy+dz*dz>2.25){px[i]=anc[j]+Mrand(.08);py[i]=anc[j+1]+Mrand(.08);pz[i]=anc[j+2]+Mrand(.08);vx[i]*=.3;vy[i]*=.3;vz[i]*=.3;}}
}

// ----- 后效: 土 -----
function applyEarth(N,sdt,anc){
  for(var i=0;i<N;i+=2){var dx=px[i]-anchorCX,dy=py[i]-anchorCY,dz=pz[i]-anchorCZ,dist=Math.sqrt(dx*dx+dy*dy+dz*dz)+1e-5,nx=dx/dist,ny=dy/dist,nz=dz/dist,fr=(1.6-dist)*8*sdt;vx[i]+=fr*nx+nz*.8*sdt;vy[i]+=fr*ny;vz[i]+=fr*nz-nx*.8*sdt;}
}

// ----- 后效: 水 -----
function applyWater(N,sdt,anc){
  for(var i=0;i<N;i+=2){vy[i]+=.003*sdt*60;var dy=py[i]-anc[i*3+1];if(dy>.5){py[i]=anc[i*3+1]-.8+Mrand(.06);px[i]=anc[i*3]+Mrand(.06);pz[i]=anc[i*3+2]+Mrand(.06);vy[i]*=.2;vx[i]*=.3;vz[i]*=.3;}}
}

// ----- 后效: 风 -----
function applyWind(N,sdt,anc){windSwitch-=sdt;if(windSwitch<=0){windUseMirror=!windUseMirror;windSwitch=.4;}}

// ----- 后效: 雷 -----
function applyThunder(N,sdt,anc){
  for(var i=0;i<N;i+=3){px[i]+=Math.sin(t*80+i*.13)*.02;if(i+1<N)py[i+1]+=Math.sin(t*80+i*.17+1.2)*.02;}
  thunderFlashTimer-=sdt;if(thunderFlashTimer<=0){thunderFlashTimer=.35+Math.random()*.4;thunderA=Math.floor(Math.random()*N);thunderB=Math.floor(Math.random()*N);thunderFlashOn=true;
    flashOverlay.style.backgroundColor='rgba(255,255,240,'+(.12+Math.random()*.15)+')';
    if(flashOverlay._t)clearTimeout(flashOverlay._t);flashOverlay._t=setTimeout(function(){flashOverlay.style.backgroundColor='rgba(255,255,240,0)';},60);}
}

// ----- 后效: 禁忌 -----
function applyForbidden(N,sdt,anc){
  if(forPhase===0){for(var i=0;i<N;i++){vx[i]-=px[i]*25*sdt;vy[i]-=py[i]*25*sdt;vz[i]-=pz[i]*25*sdt;}forTimer-=sdt;if(forTimer<=0){forPhase=1;forTimer=2;}}
  else if(forPhase===1){forTimer-=sdt;if(forTimer<=0){forPhase=2;for(var j=0;j<N;j++){vx[j]=Mrand(3);vy[j]=Mrand(3);vz[j]=Mrand(3);}}}
}

// ----- 摄像 & 交互 -----
var yaw=.7,pitch=.32,camDist=4.3,dragging=false,lastX=0,lastY=0,moved=0,camAlive=false,camPreYaw=.7,camPrePitch=.32,camYawT=0,camPitchT=.15;
canvas.onpointerdown=function(e){dragging=true;moved=0;lastX=e.clientX;lastY=e.clientY;canvas.setPointerCapture(e.pointerId);if(camAlive&&spState!==SP_IDLE)camAlive=false;};
canvas.onpointermove=function(e){if(!dragging)return;var dx=e.clientX-lastX,dy=e.clientY-lastY;moved+=Math.abs(dx)+Math.abs(dy);yaw+=dx*.0055;pitch=Math.max(-1.45,Math.min(1.45,pitch+dy*.0055));lastX=e.clientX;lastY=e.clientY;};
canvas.onpointerup=function(){dragging=false;if(moved<4)ensureAudio();};
canvas.onwheel=function(e){e.preventDefault();camDist=Math.max(1.8,Math.min(9,camDist*Math.exp(e.deltaY*.0012)));};
function rs(){var r=canvas.getBoundingClientRect(),d=window.devicePixelRatio||1;canvas.width=Math.round(r.width*d);canvas.height=Math.round(r.height*d);ctx.setTransform(d,0,0,d,0,0);}
rs();window.onresize=rs;

function doCast(){var txt=spellInput.value.trim();if(!txt)return;ensureAudio();var r=spellInput.getBoundingClientRect();var fly=document.createElement('div');fly.className='flyText';fly.textContent=txt;fly.style.left=r.left+'px';fly.style.top=r.top+'px';document.body.appendChild(fly);requestAnimationFrame(function(){fly.classList.add('go');});setTimeout(function(){fly.remove();castSpell(txt,parseInt($('countSlider').value,10));},450);}
castBtn.onclick=doCast;spellInput.onkeydown=function(e){if(e.key==='Enter')doCast();};
pauseBtn.onclick=function(){playing=!playing;pauseBtn.textContent=playing?'暂停':'播放';pauseBtn.classList.toggle('on',!playing);};
spinBtn.onclick=function(){autoSpin=!autoSpin;spinBtn.textContent=autoSpin?'旋转':'固定';spinBtn.classList.toggle('on',autoSpin);};
volSlider.oninput=function(){if(master)master.gain.value=parseFloat(volSlider.value);};
countSlider.oninput=function(){particleInfo.textContent='✦ '+countSlider.value;};

// ----- 渲染 -----
var colorCache=Object.create(null);
function col(h,l){h=((h|0)%360+360)%360;h-=h%4;l=Math.min(95,Math.max(5,l|0));l-=l%5;var k=h*100+l;var c=colorCache[k];if(!c){c='hsla('+h+',100%,'+l+'%,0.9)';colorCache[k]=c;}return c;}

var last=performance.now();
function loop(now){
  var dtms=Math.min(now-last,40);last=now;
  var sdt=capSdt(dtms),N=parseInt(countSlider.value,10);

  // 咒语状态机
  if(spState===SP_CHARGING){spTimer-=sdt;if(spTimer<=0){spState=SP_CAST;spBlend=1;if(spFamily&&spFamily.family==='forbidden'){forPhase=0;forTimer=1;}}else spBlend=easeInOutCubic(1-spTimer/spChargingDur);}
  else if(spState===SP_CAST){spState=SP_EFFECT;spTimer=spEffectDur;}
  else if(spState===SP_EFFECT){spTimer-=sdt;if(spTimer<=0){spState=SP_FADE;spTimer=spFadeDur;}}
  else if(spState===SP_FADE){spTimer-=sdt;spBlend=1-easeInOutCubic(1-spTimer/spFadeDur);if(spTimer<=0){spState=SP_IDLE;spBlend=0;spAnchorCache=null;spellHue=null;windMirror=null;camAlive=false;runeOverlay.style.opacity='0';}}
  if(spState===SP_FADE)runeOverlay.style.opacity=String(Math.max(0,spTimer/spFadeDur));

  // 摄像机
  if(camAlive&&spState!==SP_IDLE&&!dragging){if(spState===SP_CHARGING||spState===SP_CAST||spState===SP_EFFECT){yaw=lerp(yaw,camYawT,2.5*sdt);pitch=lerp(pitch,camPitchT,2.5*sdt);}else{yaw=lerp(yaw,camPreYaw,1.5*sdt);pitch=lerp(pitch,camPrePitch,1.5*sdt);}}

  // 音乐参数
  if(spState===SP_IDLE){springCur=3.5+1.5*Math.sin(t*.06);swirlCur=1.3+.3*Math.sin(t*.078);kickDC=.5;hatDC=.125;padGainBase=.025;delayFBC=.36;}
  else{var chr=spChargingDur||1.2;
    if(spState===SP_CHARGING){var pr=1-spTimer/chr;kickDC=.5+pr*.4;hatDC=.125+pr*.3;padGainBase=.025+pr*.04;springCur=3.5+pr*3;swirlCur=1.3+pr*.6;}
    else if(spState===SP_EFFECT&&spFamily){springCur=7;swirlCur=1.6;var ff=spFamily.family;
      if(ff==='fire'){kickDC=.9;hatDC=.35;}else if(ff==='earth'){kickDC=.7;padGainBase=.04;}else if(ff==='water'){hatDC=.25;padGainBase=.05;delayFBC=.5;}else if(ff==='wind'){kickDC=.4;hatDC=.15;delayFBC=.7;}else if(ff==='thunder'){kickDC=.85;hatDC=.3;}else if(ff==='forbidden'){kickDC=0;hatDC=0;padGainBase=0;}}
    else if(spState===SP_FADE&&spFamily){var fp=spTimer/spFadeDur;kickDC=lerp(spFamily.family==='forbidden'?0:.8,.5,1-fp);hatDC=lerp(.3,.125,1-fp);padGainBase=lerp(.04,.025,1-fp);delayFBC=lerp(.5,.36,1-fp);}
  }

  // 物理
  if(playing){t+=sdt;if(autoSpin&&!dragging&&!camAlive)yaw+=sdt*.08;
    var sk=springCur*6,dmp=Math.exp(-4.2*sdt);
    var useSp=spState!==SP_IDLE&&spAnchorCache&&spAnchorCache.length>0;
    var sB=spBlend;
    var curA=spAnchorCache;
    if(spFamily&&spFamily.family==='wind'&&spState===SP_EFFECT&&windMirror&&windUseMirror)curA=windMirror;
    var cLen=useSp&&curA?Math.min(N,curA.length/3):0;

    for(var i=0;i<N;i++){
      var g=target(i,N,t);
      if(useSp&&sB>.001&&i<cLen){
        var j=i*3,fg=g;
        if(spFamily&&spFamily.family==='forbidden'&&spState===SP_EFFECT&&forPhase<=1){if(forPhase===0)g=[lerp(fg[0],0,sB),lerp(fg[1],0,sB),lerp(fg[2],0,sB)];else g=[0,0,0];}
        else if(sB>.97)g=[curA[j],curA[j+1],curA[j+2]];
        else{var b=easeInOutCubic(sB);g=[lerp(fg[0],curA[j],b),lerp(fg[1],curA[j+1],b),lerp(fg[2],curA[j+2],b)];}
      }
      vx[i]=(vx[i]+(g[0]-px[i])*sk*sdt+(-pz[i])*swirlCur*sdt)*dmp;
      vy[i]=(vy[i]+(g[1]-py[i])*sk*sdt)*dmp;
      vz[i]=(vz[i]+(g[2]-pz[i])*sk*sdt+(px[i])*swirlCur*sdt)*dmp;
      px[i]+=vx[i]*sdt;py[i]+=vy[i]*sdt;pz[i]+=vz[i]*sdt;
      if(px[i]*px[i]+py[i]*py[i]+pz[i]*pz[i]>1600){px[i]=g[0];py[i]=g[1];pz[i]=g[2];vx[i]=0;vy[i]=0;vz[i]=0;}
    }

    // 后效
    if(spState===SP_EFFECT&&spAnchorCache&&curA){
      var anc=curA;
      switch(spFamily.family){
        case'fire':applyFire(N,sdt,anc);break;case'earth':applyEarth(N,sdt,anc);break;
        case'water':applyWater(N,sdt,anc);break;case'wind':applyWind(N,sdt,anc);break;
        case'thunder':applyThunder(N,sdt,anc);break;case'forbidden':applyForbidden(N,sdt,anc);break;
      }
    }
  }

  // 绘制
  var r=canvas.getBoundingClientRect(),w=r.width,h=r.height;
  var inSpE=spState===SP_EFFECT||spState===SP_CAST;
  var tCur=inSpE?12:6,tAl=.5/Math.max(1,tCur);
  ctx.globalCompositeOperation='source-over';ctx.fillStyle='rgba(0,0,0,'+tAl.toFixed(3)+')';ctx.fillRect(0,0,w,h);
  if(spFamily&&spFamily.family==='forbidden'&&spState===SP_EFFECT&&forPhase===1){ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);}
  ctx.globalCompositeOperation='lighter';
  var cy=Math.cos(yaw),sy=Math.sin(yaw),cp=Math.cos(pitch),sp=Math.sin(pitch),fov=Math.min(w,h)*1.05,cxs=w/2,cys=h/2,cd=camDist;
  var sBlendVal=spBlend;
  for(var i2=0;i2<N;i2++){var x1=cy*px[i2]+sy*pz[i2],z1=-sy*px[i2]+cy*pz[i2],y2=cp*py[i2]-sp*z1,zc=sp*py[i2]+cp*z1+cd;if(zc<.15)continue;var fz=fov/zc,sx=cxs+x1*fz,syy=cys-y2*fz;if(sx<-4||sx>w+4||syy<-4||syy>h+4)continue;var spd=Math.abs(vx[i2])+Math.abs(vy[i2])+Math.abs(vz[i2]),hu;if(spellHue&&(spState===SP_EFFECT||spState===SP_CAST)){hu=spellHue[0]+(spellHue[1]-spellHue[0])*R1[i2];}else if(spellHue&&(spState===SP_CHARGING||spState===SP_FADE)){var fh=(i2/N)*300+t*24+spd*18;hu=lerp(fh,spellHue[0]+(spellHue[1]-spellHue[0])*R1[i2],easeInOutCubic(sBlendVal));}else hu=(i2/N)*300+t*24+spd*18;if(spellHue&&spFamily&&spFamily.family==='thunder'&&thunderFlashOn&&(i2===thunderA||i2===thunderB))hu=50;var lt=Math.max(42,Math.min(82,30+130/zc+spd*9));var sMul=spState===SP_EFFECT&&spFamily&&spFamily.family==='water'?.6:1;var sz=Math.max(.7,Math.min(3.6,4.6/zc*sMul));ctx.fillStyle=col(hu,lt);ctx.fillRect(sx,syy,sz,sz);}
  if(spellHue&&spFamily&&spFamily.family==='thunder'&&thunderFlashOn){thunderFlashOn=false;var i3=thunderA,i4=thunderB;var xa=cy*px[i3]+sy*pz[i3],za=-sy*px[i3]+cy*pz[i3],ya=cp*py[i3]-sp*za,zca=sp*py[i3]+cp*za+cd;var xb=cy*px[i4]+sy*pz[i4],zb=-sy*px[i4]+cy*pz[i4],yb=cp*py[i4]-sp*zb,zcb=sp*py[i4]+cp*zb+cd;if(zca>.15&&zcb>.15){var fa=fov/zca,fb_=fov/zcb;ctx.strokeStyle='rgba(255,255,240,0.5)';ctx.lineWidth=2;ctx.beginPath();var sxa=cxs+xa*fa,sya=cys-ya*fa,sxb=cxs+xb*fb_,syb=cys-yb*fb_;ctx.moveTo(sxa,sya);for(var kk_=1;kk_<5;kk_++){var lk=kk_/5;ctx.lineTo(sxa+(sxb-sxa)*lk+Mrand(8),sya+(syb-sya)*lk+Mrand(8));}ctx.lineTo(sxb,syb);ctx.stroke();}}

  // 状态文字
  ctx.globalCompositeOperation='source-over';ctx.textAlign='left';
  if(spState!==SP_IDLE&&spFamily){ctx.font='600 15px '+STATUS_FONT;var status='';if(spState===SP_CHARGING)status='⟳ 聚气成咒 · '+spLabel+' · '+FAM_NAMES[spFamily.family]+' · '+(spTimer/spChargingDur*100).toFixed(0)+'%';else if(spState===SP_CAST)status='✦ 咒成！'+spLabel+' · '+FAM_NAMES[spFamily.family];else if(spState===SP_EFFECT)status=spFamily.rune+' '+spLabel+' · '+FAM_NAMES[spFamily.family]+' · 咒力持续('+(spTimer/spEffectDur*5).toFixed(1)+'s)';else if(spState===SP_FADE)status='⟳ 咒力消散 · '+spTimer.toFixed(1)+'s';ctx.fillStyle=spFamily.clr;ctx.shadowColor=spFamily.clr;ctx.shadowBlur=8;ctx.fillText(status,16,h-36);ctx.shadowBlur=0;if(fontMissingWarn){ctx.font='600 12px '+STATUS_FONT;ctx.fillStyle='rgba(255,140,120,0.85)';ctx.fillText('⚠ 未检测到中文字体,咒语文字可能无法正常成形',16,h-54);}}
  else{ctx.font='400 13px '+STATUS_FONT;ctx.fillStyle='rgba(120,110,70,0.5)';ctx.fillText('✦ 输入咒语,按下施咒 · 粒子世界回应你',16,h-36);}
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
ensureAudio();
})();
</script>
