<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>涓€澶滈奔榫欒垶 路 鍜掓垚</title>
<style>
@font-face{font-family:'CJKFallback';src:local('Microsoft YaHei'),local('寰蒋闆呴粦'),local('PingFang SC'),local('鑻规柟-绠€'),local('Noto Sans CJK SC'),local('Noto Sans SC'),local('Source Han Sans SC'),local('鎬濇簮榛戜綋'),local('WenQuanYi Micro Hei'),local('鏂囨硥椹垮井绫抽粦'),local('SimHei'),local('榛戜綋');}
body{margin:0;background:#08080c;color:#d4c8a0;font-family:system-ui,'CJKFallback','Microsoft YaHei',sans-serif;display:flex;justify-content:center;overflow:hidden;height:100vh;}
.wrap{width:100vw;height:100vh;display:flex;flex-direction:column;position:relative;}
h1{position:absolute;top:12px;left:16px;font-size:13px;font-weight:400;margin:0;color:#6a5f4a;z-index:2;letter-spacing:0.18em;}
#canvas{flex:1;display:block;background:#08080c;cursor:grab;touch-action:none;min-height:0;}
#canvas:active{cursor:grabbing;}
#runeOverlay{position:absolute;top:40px;right:20px;font-size:48px;opacity:0;transition:opacity 0.4s;z-index:2;text-shadow:0 0 18px currentColor;}
#spellInputWrap{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;z-index:2;}
#spellInput{background:rgba(10,9,14,0.92);color:#d4c8a0;border:1px solid #4a4028;border-radius:6px;padding:10px 16px;font-size:15px;width:160px;outline:none;font-family:'CJKFallback','Microsoft YaHei',sans-serif;letter-spacing:0.12em;transition:border-color 0.25s;}
#spellInput:focus{border-color:#a08040;}
#spellInput::placeholder{color:#4a4028;letter-spacing:0.08em;}
#castBtn{background:rgba(20,18,14,0.92);color:#c8a840;border:1px solid #5a4a28;border-radius:6px;padding:10px 20px;font-size:14px;cursor:pointer;font-family:'CJKFallback','Microsoft YaHei',sans-serif;letter-spacing:0.15em;transition:all 0.25s;}
#castBtn:hover{border-color:#a08040;background:rgba(30,26,18,0.95);}
#castBtn:active{background:rgba(45,35,18,0.95);}
#historyList{position:absolute;bottom:80px;left:20px;display:flex;flex-direction:column-reverse;gap:6px;z-index:2;font-size:13px;}
.histItem{color:#6a5f4a;opacity:0.7;transition:opacity 0.6s;font-family:'CJKFallback','Microsoft YaHei',sans-serif;letter-spacing:0.08em;}
.histItem.new{opacity:0.95;color:#c8a840;}
#controls{position:absolute;bottom:24px;right:20px;display:flex;gap:12px;align-items:center;z-index:2;}
#controls button{background:rgba(10,9,14,0.85);color:#6a5f4a;border:1px solid #2a2214;border-radius:4px;padding:5px 10px;font-size:11px;cursor:pointer;transition:all 0.2s;}
#controls button:hover{border-color:#4a4028;color:#8a7f5a;}
#controls button.on{color:#c8a840;border-color:#5a4a28;}
#volSlider{width:60px;accent-color:#a08040;background:transparent;}
#particleInfo{position:absolute;top:12px;right:20px;font-size:11px;color:#4a4028;z-index:2;}
.flyText{position:fixed;font-size:48px;color:#d4c8a0;font-family:'CJKFallback','Microsoft YaHei',sans-serif;pointer-events:none;z-index:10;transition:all 0.5s cubic-bezier(0.22,0.61,0.36,1);opacity:1;text-shadow:0 0 30px rgba(200,168,64,0.6);}
.flyText.go{transform:scale(3.5);opacity:0;text-shadow:0 0 80px rgba(200,168,64,0.9);}
#flashOverlay{position:fixed;top:0;left:0;width:100vw;height:100vh;background:#fff;opacity:0;pointer-events:none;z-index:5;transition:opacity 0.04s;}
</style>
</head>
<body>
<div id="flashOverlay"></div>
<div class="wrap">
  <h1>涓€澶滈奔榫欒垶 路 鍜掓垚</h1>
  <div id="runeOverlay"></div>
  <canvas id="canvas"></canvas>
  <div id="particleInfo">鉁?8000</div>
  <div id="spellInputWrap">
    <input type="text" id="spellInput" maxlength="6" placeholder="杈撳叆鍜掕鈥? value="鐐庡拻">
    <button id="castBtn">鏂藉拻 鉁?/button>
  </div>
  <div id="historyList"></div>
  <div id="controls">
    <button id="pauseBtn">鏆傚仠</button>
    <button id="spinBtn" class="on">鏃嬭浆</button>
    <input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.6" title="闊抽噺">
    <div style="color:#4a4028;font-size:10px;">绮掑瓙</div>
    <input type="range" id="countSlider" min="2000" max="16000" step="500" value="8000" style="width:50px;accent-color:#a08040;">
  </div>
</div>
<script>
(function(){
'use strict';
const PI=Math.PI,PI2=PI*2,canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const $=id=>document.getElementById(id);
const spellInput=$('spellInput'),castBtn=$('castBtn'),runeOverlay=$('runeOverlay'),historyList=$('historyList');
const flashOverlay=$('flashOverlay'),particleInfo=$('particleInfo'),pauseBtn=$('pauseBtn'),spinBtn=$('spinBtn');
const volSlider=$('volSlider'),countSlider=$('countSlider');
const NMAX=16000;
const FONT_STACK='"CJKFallback","Microsoft YaHei","PingFang SC","Noto Sans CJK SC","Noto Sans SC","WenQuanYi Micro Hei","SimHei",sans-serif';
const STATUS_FONT='system-ui,'+FONT_STACK;
const px=new Float32Array(NMAX),py=new Float32Array(NMAX),pz=new Float32Array(NMAX);
const vx=new Float32Array(NMAX),vy=new Float32Array(NMAX),vz=new Float32Array(NMAX);
const R1=new Float32Array(NMAX),R2=new Float32Array(NMAX),R3=new Float32Array(NMAX),R4=new Float32Array(NMAX);
for(let i=0;i<NMAX;i++){R1[i]=Math.random();R2[i]=Math.random();R3[i]=Math.random();R4[i]=Math.random();const r=2*Math.cbrt(Math.random()),th=Math.random()*PI2,ph=Math.acos(Math.random()*2-1);px[i]=r*Math.sin(ph)*Math.cos(th);py[i]=r*Math.cos(ph);pz[i]=r*Math.sin(ph)*Math.sin(th);}
let playing=true,autoSpin=true,t=0,springCur=3.5,swirlCur=1.3,fontMissingWarn=false;
const Mrand=s=>(Math.random()-0.5)*s;
function easeInOutCubic(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
function lerp(a,b,t){return a+(b-a)*t;}

const textCanvas=document.createElement('canvas');textCanvas.width=1024;textCanvas.height=256;
const textCtx=textCanvas.getContext('2d');
function genTextAnchors(N,text){
  const w=1024,h=256,tc=textCtx;tc.clearRect(0,0,w,h);tc.fillStyle='#000';tc.fillRect(0,0,w,h);tc.fillStyle='#fff';
  let fs=220;tc.font='bold '+fs+'px '+FONT_STACK;tc.textAlign='center';tc.textBaseline='middle';
  let m=tc.measureText(text);if(m.width>w*0.9)fs=Math.floor(fs*w*0.9/m.width);
  tc.font='bold '+fs+'px '+FONT_STACK;m=tc.measureText(text);tc.fillText(text,w/2,h/2);
  const imgData=tc.getImageData(0,0,w,h).data,bright=[];
  for(let y=0;y<h;y++)for(let x=0;x<w;x++)if(imgData[(y*w+x)*4]>190)bright.push([x,y]);
  const a=new Float32Array(N*3);
  if(bright.length<50){fontMissingWarn=true;for(let i=0;i<N;i++){const th=Math.random()*PI2,ph=Math.acos(Math.random()*2-1),r=1+Math.random()*0.2,j=i*3;a[j]=r*Math.sin(ph)*Math.cos(th);a[j+1]=r*Math.cos(ph);a[j+2]=r*Math.sin(ph)*Math.sin(th);}return a;}
  fontMissingWarn=false;const scale=1.4/h,zDepth=0.28,nLayers=5,perLayer=Math.floor(N/nLayers);
  for(let layer=0;layer<nLayers;layer++){const zOff=(layer/(nLayers-1)-0.5)*zDepth;for(let i=layer*perLayer,s=(layer===nLayers-1?N:(layer+1)*perLayer);i<s;i++){const[pX,pY]=bright[Math.floor(Math.random()*bright.length)],j=i*3;a[j]=(pX-w/2)*scale+Mrand(0.008);a[j+1]=(h/2-pY)*scale+Mrand(0.006);a[j+2]=zOff+Mrand(0.012);}}
  for(let i=N-1;i>0;i--){const ri=Math.floor(Math.random()*(i+1)),j0=i*3,j1=ri*3;[a[j0],a[j0+1],a[j0+2],a[j1],a[j1+1],a[j1+2]]=[a[j1],a[j1+1],a[j1+2],a[j0],a[j0+1],a[j0+2]];}
  return a;
}

function target(i,N,t){const u=i/N,rr=0.15+R1[i]*R1[i]*1.9,arm=Math.floor(R2[i]*3)/3*PI2,ang=arm+rr*6-t*0.35+(R3[i]-0.5)*0.275;return[rr*Math.cos(ang),(R4[i]-0.5)*0.55*Math.exp(-rr*1.3)+0.03*Math.sin(rr*8-t),rr*Math.sin(ang)];}

const SPELL_FAMILIES={fire:{kw:['裂','炎','焚','爆','灼','烬','赤','火','烧','焰','fire','flame','burn','blast'],rune:'\u25B3',hue:[0,40],pri:6,chr:1.2,clr:'#e06030'},earth:{kw:['盾','壁','镇','固','磐','山','界','御','守','earth','shield','wall','guard'],rune:'\u25A1',hue:[35,65],pri:5,chr:1.2,clr:'#c89040'},water:{kw:['愈','生','春','息','润','流','清','疗','复','water','heal','flow','cure'],rune:'\u25CB',hue:[170,210],pri:4,chr:1.2,clr:'#40a0c0'},wind:{kw:['幻','梦','迷','隐','镜','影','花','雾','wind','dream','mirror','mist'],rune:'\u2248',hue:[260,300],pri:3,chr:1.2,clr:'#8060c0'},thunder:{kw:['雷','霆','电','闪','亟','碎','霹','雳','thunder','lightning','bolt','shock'],rune:'\u26A1',hue:[45,60],pri:8,chr:0.2,clr:'#e8d840'},forbidden:{kw:['灭','无','空','寂','终','零','void','null','end','zero'],rune:'\u2715',hue:[0,360],pri:10,chr:1.5,clr:'#404040'}};
const FAM_NAMES={fire:'火\u00B7烈',earth:'土\u00B7镇',water:'水\u00B7愈',wind:'风\u00B7幻',thunder:'雷\u00B7霆',forbidden:'禁忌\u00B7灭'};
function classifySpell(text){let best=null;for(const[k,f]of Object.entries(SPELL_FAMILIES)){for(const kw of f.kw){if(text.indexOf(kw)>=0&&(!best||f.pri>best.pri)){best={family:k,...f};break;}}}return best||{family:'wind',...SPELL_FAMILIES.wind};}

const SP_IDLE=0,SP_CHARGING=1,SP_CAST=2,SP_EFFECT=3,SP_FADE=4;
let spState=SP_IDLE,spTimer=0,spFamily=null,spLabel='',spAnchorCache=null,spBlend=0;
let spChargingDur=1.2,spEffectDur=5,spFadeDur=1.5;
let windMirror=null,windUseMirror=false,windSwitch=0;
let thunderFlashTimer=0,thunderA=0,thunderB=0,thunderFlashOn=false;
let forPhase=0,forTimer=0;
let spellHue=null,anchorCX=0,anchorCY=0,anchorCZ=0;

function castSpell(text,N){
  spFamily=classifySpell(text);spLabel=text;spChargingDur=spFamily.chr;
  spState=SP_CHARGING;spTimer=spChargingDur;spBlend=0;spellHue=spFamily.hue;
  windMirror=null;windUseMirror=false;windSwitch=0;thunderFlashTimer=0;thunderFlashOn=false;forPhase=0;forTimer=0;
  spAnchorCache=genTextAnchors(N,text);anchorCX=0;anchorCY=0;anchorCZ=0;
  if(spAnchorCache){for(let i=0;i<N*3;i+=3){anchorCX+=spAnchorCache[i];anchorCY+=spAnchorCache[i+1];anchorCZ+=spAnchorCache[i+2];}anchorCX/=N;anchorCY/=N;anchorCZ/=N;}
  if(spFamily.family==='wind'){windMirror=new Float32Array(N*3);for(let i=0;i<N;i++){const j=i*3;windMirror[j]=-spAnchorCache[j];windMirror[j+1]=spAnchorCache[j+1];windMirror[j+2]=spAnchorCache[j+2];}}
  runeOverlay.textContent=spFamily.rune;runeOverlay.style.color=spFamily.clr;runeOverlay.style.opacity='1';
  addHistory(spLabel,spFamily.rune,spFamily.clr);camAlive=true;camPreYaw=yaw;camPrePitch=pitch;camYawT=0;camPitchT=0.15;
  scheduleSpellCastBurst();
}
function addHistory(text,rune,color){const div=document.createElement('div');div.className='histItem new';div.style.color=color;div.textContent=rune+' '+text;historyList.appendChild(div);if(historyList.children.length>3)historyList.children[0].remove();setTimeout(()=>div.classList.remove('new'),3000);for(let i=0;i<historyList.children.length-1;i++)historyList.children[i].style.opacity='0.35';}

let AC=null,master=null,delaySend=null,noiseBuf=null,audioInited=false,nextAudioT=0,audioBeat=0;
let padGainBase=0.025,padGainCur=0.025,padGainNode=null,kickDC=0.5,hatDC=0.125,delayFB=0.36,delayFBC=0.36,muteSpell=false;
function initAudio(){AC=new(window.AudioContext||window.webkitAudioContext)();master=AC.createGain();master.gain.value=parseFloat(volSlider.value);const comp=AC.createDynamicsCompressor();master.connect(comp);comp.connect(AC.destination);delaySend=AC.createGain();delaySend.gain.value=0.25;const dly=AC.createDelay(1);dly.delayTime.value=0.28;const fb=AC.createGain();fb.gain.value=0.36;const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=2200;delaySend.connect(dly);dly.connect(fb);fb.connect(lp);lp.connect(dly);dly.connect(master);padGainNode=AC.createGain();padGainNode.gain.value=padGainCur;padGainNode.connect(master);padGainNode.connect(delaySend);noiseBuf=AC.createBuffer(1,AC.sampleRate,AC.sampleRate);const d=noiseBuf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;audioInited=true;nextAudioT=AC.currentTime+0.1;}
function ensureAudio(){if(!AC)initAudio();if(AC.state==='suspended')AC.resume();}
const mtof=m=>440*Math.pow(2,(m-69)/12);
function kk(t0){if(!AC||muteSpell)return;const o=AC.createOscillator();o.type='sine';o.frequency.setValueAtTime(160,t0);o.frequency.exponentialRampToValueAtTime(42,t0+0.11);const g=AC.createGain();g.gain.setValueAtTime(0.75,t0);g.gain.exponentialRampToValueAtTime(0.001,t0+0.17);o.connect(g);g.connect(master);o.start(t0);o.stop(t0+0.2);}
function hh(t0,open,vel){if(!AC||muteSpell)return;const src=AC.createBufferSource();src.buffer=noiseBuf;src.playbackRate.value=1.4;const hp=AC.createBiquadFilter();hp.type='highpass';hp.frequency.value=7400;const g=AC.createGain();g.gain.setValueAtTime(vel,t0);g.gain.exponentialRampToValueAtTime(0.001,t0+(open?0.28:0.045));src.connect(hp);hp.connect(g);g.connect(master);src.start(t0);src.stop(t0+0.32);}
function padNote(t0,freq,gain,dur){if(!AC||muteSpell)return;const o=AC.createOscillator();o.type='triangle';o.frequency.value=freq;const lp2=AC.createBiquadFilter();lp2.type='lowpass';lp2.frequency.value=1100;const g=AC.createGain();g.gain.setValueAtTime(0,t0);g.gain.linearRampToValueAtTime(gain,t0+0.3);g.gain.exponentialRampToValueAtTime(0.001,t0+dur);o.connect(lp2);lp2.connect(g);g.connect(padGainNode);o.start(t0);o.stop(t0+dur+0.1);}

function scheduleSpellCastBurst(){if(!AC||AC.state==='suspended')return;const t0=AC.currentTime+spChargingDur;const f=spFamily.family;
  if(f==='fire'){const src=AC.createBufferSource();src.buffer=noiseBuf;const bp=AC.createBiquadFilter();bp.type='bandpass';bp.frequency.value=3000;bp.Q.value=0.5;const g=AC.createGain();g.gain.setValueAtTime(0.35,t0);g.gain.exponentialRampToValueAtTime(0.001,t0+0.15);src.connect(bp);bp.connect(g);g.connect(master);src.start(t0);src.stop(t0+0.2);}
  else if(f==='earth'){const o=AC.createOscillator();o.type='sine';o.frequency.setValueAtTime(42,t0);o.frequency.linearRampToValueAtTime(38,t0+0.3);const g=AC.createGain();g.gain.setValueAtTime(0.3,t0);g.gain.exponentialRampToValueAtTime(0.001,t0+0.3);o.connect(g);g.connect(master);o.start(t0);o.stop(t0+0.35);}
  else if(f==='water'){const frs=[523,659,784];for(let k=0;k<3;k++){const o=AC.createOscillator();o.type='triangle';o.frequency.value=frs[k];const g=AC.createGain();g.gain.setValueAtTime(0,t0+k*0.06);g.gain.linearRampToValueAtTime(0.12,t0+k*0.06+0.25);g.gain.exponentialRampToValueAtTime(0.001,t0+k*0.06+0.8);o.connect(g);g.connect(delaySend);o.start(t0+k*0.06);o.stop(t0+k*0.06+0.85);}}
  else if(f==='wind'){delayFBC=0.7;setTimeout(()=>{delayFBC=0.36;},1200);}
  else if(f==='thunder'){const o=AC.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(500,t0);o.frequency.exponentialRampToValueAtTime(8000,t0+0.08);const g=AC.createGain();g.gain.setValueAtTime(0.25,t0);g.gain.exponentialRampToValueAtTime(0.001,t0+0.08);o.connect(g);g.connect(master);o.start(t0);o.stop(t0+0.1);}
  else if(f==='forbidden'){muteSpell=true;setTimeout(()=>{muteSpell=false;if(AC){const o=AC.createOscillator();o.type='sine';o.frequency.value=30;const g=AC.createGain();g.gain.setValueAtTime(0.0001,AC.currentTime);g.gain.linearRampToValueAtTime(0.2,AC.currentTime+3);o.connect(g);g.connect(master);o.start();setTimeout(()=>{g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+1.5);setTimeout(()=>o.stop(),1600);},3000);}},2500);}}

const CHORD_SEQ=[[57,60,64],[53,57,60],[60,64,67],[55,59,62]];
setInterval(()=>{if(!AC||!audioInited||!playing||document.hidden){nextAudioT=AC.currentTime+0.1;return;}ensureAudio();const now=AC.currentTime;if(nextAudioT<now+0.08)nextAudioT=now+0.08;const beat=0.75;while(nextAudioT<now+0.2){const rel=audioBeat%16,bar=Math.floor(audioBeat/4)%4;if(Math.random()<((rel%4===0||rel%4===2)?kickDC:0))kk(nextAudioT);if(Math.random()<hatDC)hh(nextAudioT,false,0.08+hatDC*0.5);if(rel===0){const ch=CHORD_SEQ[bar%4];for(const n of ch)padNote(nextAudioT,mtof(n),padGainCur*0.25,beat*15.5);}if(delaySend){delaySend.gain.value+=((0.22+delayFBC*0.4)-delaySend.gain.value)*0.08;if(padGainNode){padGainCur+=(padGainBase-padGainCur)*0.05;padGainNode.gain.value=padGainCur;}}nextAudioT+=beat;audioBeat++;}},35);

function applyFire(N,sdt,anc){for(let i=1;i<N;i+=2){const j=i*3;if(Math.random()<0.02*sdt*60){const th=Math.random()*6.2832,ph=Math.acos(Math.random()*2-1),spd=0.3+Math.random()*1.5;vx[i]-=Math.sin(ph)*Math.cos(th)*spd;vy[i]-=Math.sin(ph)*Math.sin(th)*spd;vz[i]+=Math.cos(ph)*spd;}const dx=px[i]-anc[j],dy=py[i]-anc[j+1],dz=pz[i]-anc[j+2];if(dx*dx+dy*dy+dz*dz>2.25){px[i]=anc[j]+Mrand(0.08);py[i]=anc[j+1]+Mrand(0.08);pz[i]=anc[j+2]+Mrand(0.08);vx[i]*=0.3;vy[i]*=0.3;vz[i]*=0.3;}}}
function applyEarth(N,sdt,anc){for(let i=0;i<N;i+=2){const dx=px[i]-anchorCX,dy=py[i]-anchorCY,dz=pz[i]-anchorCZ,dist=Math.sqrt(dx*dx+dy*dy+dz*dz)+1e-5,nx=dx/dist,ny=dy/dist,nz=dz/dist,fr=(1.6-dist)*8*sdt;vx[i]+=fr*nx+nz*0.8*sdt;vy[i]+=fr*ny;vz[i]+=fr*nz-nx*0.8*sdt;}}
function applyWater(N,sdt,anc){for(let i=0;i<N;i+=2){vy[i]+=0.003*sdt*60;const dy=py[i]-anc[i*3+1];if(dy>0.5){py[i]=anc[i*3+1]-0.8+Mrand(0.06);px[i]=anc[i*3]+Mrand(0.06);pz[i]=anc[i*3+2]+Mrand(0.06);vy[i]*=0.2;vx[i]*=0.3;vz[i]*=0.3;}}}
function applyWind(N,sdt,anc){windSwitch-=sdt;if(windSwitch<=0){windUseMirror=!windUseMirror;windSwitch=0.4;}}
function applyThunder(N,sdt,anc){const bs=Math.sin(t*80);for(let i=0;i<N;i+=3){px[i]+=Math.sin(t*80+i*0.13)*0.02;py[i+1]?py[i+1]+=Math.sin(t*80+i*0.17+1.2)*0.02:0;}thunderFlashTimer-=sdt;if(thunderFlashTimer<=0){thunderFlashTimer=0.35+Math.random()*0.4;thunderA=Math.floor(Math.random()*N);thunderB=Math.floor(Math.random()*N);thunderFlashOn=true;flashOverlay.style.backgroundColor='rgba(255,255,240,'+(0.12+Math.random()*0.15)+')';if(flashOverlay._t)clearTimeout(flashOverlay._t);flashOverlay._t=setTimeout(()=>{flashOverlay.style.backgroundColor='rgba(255,255,240,0)';},60);}}
function applyForbidden(N,sdt,anc){if(forPhase===0){for(let i=0;i<N;i++){vx[i]-=px[i]*25*sdt;vy[i]-=py[i]*25*sdt;vz[i]-=pz[i]*25*sdt;}forTimer-=sdt;if(forTimer<=0){forPhase=1;forTimer=2;}}else if(forPhase===1){forTimer-=sdt;if(forTimer<=0){forPhase=2;for(let i=0;i<N;i++){vx[i]=Mrand(3);vy[i]=Mrand(3);vz[i]=Mrand(3);}}}}

let yaw=0.7,pitch=0.32,camDist=4.3,dragging=false,lastX=0,lastY=0,moved=0,camAlive=false,camPreYaw=0.7,camPrePitch=0.32,camYawT=0,camPitchT=0.15;
canvas.onpointerdown=e=>{dragging=true;moved=0;lastX=e.clientX;lastY=e.clientY;canvas.setPointerCapture(e.pointerId);if(camAlive&&spState!==SP_IDLE)camAlive=false;};
canvas.onpointermove=e=>{if(!dragging)return;const dx=e.clientX-lastX,dy=e.clientY-lastY;moved+=Math.abs(dx)+Math.abs(dy);yaw+=dx*0.0055;pitch=Math.max(-1.45,Math.min(1.45,pitch+dy*0.0055));lastX=e.clientX;lastY=e.clientY;};
canvas.onpointerup=()=>{dragging=false;if(moved<4)ensureAudio();};
canvas.onwheel=e=>{e.preventDefault();camDist=Math.max(1.8,Math.min(9,camDist*Math.exp(e.deltaY*0.0012)));};
function rs(){const r=canvas.getBoundingClientRect(),d=window.devicePixelRatio||1;canvas.width=Math.round(r.width*d);canvas.height=Math.round(r.height*d);ctx.setTransform(d,0,0,d,0,0);}
rs();window.onresize=rs;

function doCast(){const txt=spellInput.value.trim();if(!txt)return;ensureAudio();const r=spellInput.getBoundingClientRect();const fly=document.createElement('div');fly.className='flyText';fly.textContent=txt;fly.style.left=r.left+'px';fly.style.top=r.top+'px';document.body.appendChild(fly);requestAnimationFrame(()=>fly.classList.add('go'));setTimeout(()=>{fly.remove();castSpell(txt,parseInt($('countSlider').value,10));},450);}
castBtn.onclick=doCast;spellInput.onkeydown=e=>{if(e.key==='Enter')doCast();};
pauseBtn.onclick=()=>{playing=!playing;pauseBtn.textContent=playing?'暂停':'播放';pauseBtn.classList.toggle('on',!playing);};
spinBtn.onclick=()=>{autoSpin=!autoSpin;spinBtn.textContent=autoSpin?'旋转':'固定';spinBtn.classList.toggle('on',autoSpin);};
volSlider.oninput=()=>{if(master)master.gain.value=parseFloat(volSlider.value);};
countSlider.oninput=()=>{particleInfo.textContent='✦ '+countSlider.value;};

const colorCache=Object.create(null);
function col(h,l){h=((h|0)%360+360)%360;h-=h%4;l=Math.min(95,Math.max(5,l|0));l-=l%5;const k=h*100+l;let c=colorCache[k];if(!c){c='hsla('+h+',100%,'+l+'%,0.9)';colorCache[k]=c;}return c;}

let last=performance.now();
function loop(now){
  const dtms=Math.min(now-last,50);last=now;
  const sdt=Math.min(dtms*0.001,0.05),N=parseInt(countSlider.value,10);

  if(spState===SP_CHARGING){spTimer-=sdt;if(spTimer<=0){spState=SP_CAST;spBlend=1;if(spFamily.family==='forbidden'){forPhase=0;forTimer=1;}}else spBlend=easeInOutCubic(1-spTimer/spChargingDur);}
  else if(spState===SP_CAST){spState=SP_EFFECT;spTimer=spEffectDur;}
  else if(spState===SP_EFFECT){spTimer-=sdt;if(spTimer<=0){spState=SP_FADE;spTimer=spFadeDur;}}
  else if(spState===SP_FADE){spTimer-=sdt;spBlend=1-easeInOutCubic(1-spTimer/spFadeDur);if(spTimer<=0){spState=SP_IDLE;spBlend=0;spAnchorCache=null;spellHue=null;windMirror=null;camAlive=false;runeOverlay.style.opacity='0';}}
  if(spState===SP_FADE)runeOverlay.style.opacity=String(Math.max(0,spTimer/spFadeDur));

  if(camAlive&&spState!==SP_IDLE&&!dragging){if(spState===SP_CHARGING||spState===SP_CAST||spState===SP_EFFECT){yaw=lerp(yaw,camYawT,2.5*sdt);pitch=lerp(pitch,camPitchT,2.5*sdt);}else{yaw=lerp(yaw,camPreYaw,1.5*sdt);pitch=lerp(pitch,camPrePitch,1.5*sdt);}}

  if(spState===SP_IDLE){springCur=3.5+1.5*Math.sin(t*0.06);swirlCur=1.3+0.3*Math.sin(t*0.078);kickDC=0.5;hatDC=0.125;padGainBase=0.025;delayFBC=0.36;}
  else{const chr=spChargingDur||1.2;if(spState===SP_CHARGING){const pr=1-spTimer/chr;kickDC=0.5+pr*0.4;hatDC=0.125+pr*0.3;padGainBase=0.025+pr*0.04;springCur=3.5+pr*3;swirlCur=1.3+pr*0.6;}else if(spState===SP_EFFECT){springCur=7;swirlCur=1.6;const f=spFamily.family;if(f==='fire'){kickDC=0.9;hatDC=0.35;}else if(f==='earth'){kickDC=0.7;padGainBase=0.04;}else if(f==='water'){hatDC=0.25;padGainBase=0.05;delayFBC=0.5;}else if(f==='wind'){kickDC=0.4;hatDC=0.15;delayFBC=0.7;}else if(f==='thunder'){kickDC=0.85;hatDC=0.3;}else if(f==='forbidden'){kickDC=0;hatDC=0;padGainBase=0;}}else if(spState===SP_FADE&&spFamily){const fp=spTimer/spFadeDur;kickDC=lerp(spFamily.family==='forbidden'?0:0.8,0.5,1-fp);hatDC=lerp(0.3,0.125,1-fp);padGainBase=lerp(0.04,0.025,1-fp);delayFBC=lerp(0.5,0.36,1-fp);}}

  if(playing){t+=sdt;if(autoSpin&&!dragging&&!camAlive)yaw+=sdt*0.08;const sk=springCur*6,dmp=Math.exp(-4.2*sdt);const useSp=spState!==SP_IDLE&&spAnchorCache;const sB=spBlend;let curA=spAnchorCache;if(spFamily&&spFamily.family==='wind'&&spState===SP_EFFECT&&windMirror&&windUseMirror)curA=windMirror;const cLen=useSp&&curA?Math.min(N,curA.length/3):0;
  for(let i=0;i<N;i++){let g=target(i,N,t);if(useSp&&sB>0.0005&&i<cLen){const j=i*3,fg=g;if(spFamily&&spFamily.family==='forbidden'&&spState===SP_EFFECT&&forPhase<=1){if(forPhase===0)g=[lerp(fg[0],0,sB),lerp(fg[1],0,sB),lerp(fg[2],0,sB)];else g=[0,0,0];}else if(sB>0.97)g=[curA[j],curA[j+1],curA[j+2]];else{const b=easeInOutCubic(sB);g=[lerp(fg[0],curA[j],b),lerp(fg[1],curA[j+1],b),lerp(fg[2],curA[j+2],b)];}}
    vx[i]=(vx[i]+(g[0]-px[i])*sk*sdt+(-pz[i])*swirlCur*sdt)*dmp;vy[i]=(vy[i]+(g[1]-py[i])*sk*sdt)*dmp;vz[i]=(vz[i]+(g[2]-pz[i])*sk*sdt+(px[i])*swirlCur*sdt)*dmp;
    px[i]+=vx[i]*sdt;py[i]+=vy[i]*sdt;pz[i]+=vz[i]*sdt;if(px[i]*px[i]+py[i]*py[i]+pz[i]*pz[i]>1600){px[i]=g[0];py[i]=g[1];pz[i]=g[2];vx[i]=vy[i]=vz[i]=0;}}
  if(spState===SP_EFFECT&&spAnchorCache){const anc=curA||spAnchorCache;switch(spFamily.family){case'fire':applyFire(N,sdt,anc);break;case'earth':applyEarth(N,sdt,anc);break;case'water':applyWater(N,sdt,anc);break;case'wind':applyWind(N,sdt,anc);break;case'thunder':applyThunder(N,sdt,anc);break;case'forbidden':applyForbidden(N,sdt,anc);break;}}}

  const r=canvas.getBoundingClientRect(),w=r.width,h=r.height;
  const inSpE=spState===SP_EFFECT||spState===SP_CAST;
  const tCur=inSpE?12:6,tAl=0.5/Math.max(1,tCur);
  ctx.globalCompositeOperation='source-over';ctx.fillStyle='rgba(0,0,0,'+tAl.toFixed(3)+')';ctx.fillRect(0,0,w,h);
  if(spFamily&&spFamily.family==='forbidden'&&spState===SP_EFFECT&&forPhase===1){ctx.fillStyle='rgba(0,0,0,1)';ctx.fillRect(0,0,w,h);}
  ctx.globalCompositeOperation='lighter';
  const cy=Math.cos(yaw),sy=Math.sin(yaw),cp=Math.cos(pitch),sp=Math.sin(pitch),fov=Math.min(w,h)*1.05,cxs=w/2,cys=h/2,cd=camDist;
  for(let i=0;i<N;i++){const x1=cy*px[i]+sy*pz[i],z1=-sy*px[i]+cy*pz[i],y2=cp*py[i]-sp*z1,zc=sp*py[i]+cp*z1+cd;if(zc<0.15)continue;const f=fov/zc,sx=cxs+x1*f,syy=cys-y2*f;if(sx<-4||sx>w+4||syy<-4||syy>h+4)continue;const spd=Math.abs(vx[i])+Math.abs(vy[i])+Math.abs(vz[i]);let hu;if(spellHue&&(spState===SP_EFFECT||spState===SP_CAST)){const[mx,my]=spellHue;hu=mx+(my-mx)*R1[i];}else if(spState===SP_CHARGING||spState===SP_FADE){const fh=(i/N)*300+t*24+spd*18,[mx,my]=spellHue||[0,360];hu=lerp(fh,mx+(my-mx)*R1[i],easeInOutCubic(sB));}else hu=(i/N)*300+t*24+spd*18;if(spellHue&&spFamily&&spFamily.family==='thunder'&&thunderFlashOn&&(i===thunderA||i===thunderB))hu=50;const lt=Math.max(42,Math.min(82,30+130/zc+spd*9));const sMul=spState===SP_EFFECT&&spFamily&&spFamily.family==='water'?0.6:1;const sz=Math.max(0.7,Math.min(3.6,4.6/zc*sMul));ctx.fillStyle=col(hu,lt);ctx.fillRect(sx,syy,sz,sz);}
  if(spellHue&&spFamily&&spFamily.family==='thunder'&&thunderFlashOn){thunderFlashOn=false;const i=thunderA,j=thunderB;const xa=cy*px[i]+sy*pz[i],za=-sy*px[i]+cy*pz[i],ya=cp*py[i]-sp*za,zca=sp*py[i]+cp*za+cd,xb=cy*px[j]+sy*pz[j],zb=-sy*px[j]+cy*pz[j],yb=cp*py[j]-sp*zb,zcb=sp*py[j]+cp*zb+cd;if(zca>0.15&&zcb>0.15){const fa=fov/zca,fb=fov/zb;ctx.strokeStyle='rgba(255,255,240,0.5)';ctx.lineWidth=2;ctx.beginPath();const sxa=cxs+xa*fa,sya=cys-ya*fa,sxb=cxs+xb*fb,syb=cys-yb*fb;ctx.moveTo(sxa,sya);for(let k=1;k<5;k++){const lk=k/5;ctx.lineTo(sxa+(sxb-sxa)*lk+Mrand(8),sya+(syb-sya)*lk+Mrand(8));}ctx.lineTo(sxb,syb);ctx.stroke();}}

  ctx.globalCompositeOperation='source-over';ctx.textAlign='left';
  if(spState!==SP_IDLE&&spFamily){ctx.font='600 15px '+STATUS_FONT;let status='';if(spState===SP_CHARGING)status='\u27F3 \u805A\u6C14\u6210\u5492 \u00B7 '+spLabel+' \u00B7 '+FAM_NAMES[spFamily.family]+' \u00B7 '+(spTimer/spChargingDur*100).toFixed(0)+'%';else if(spState===SP_CAST)status='\u2726 \u5492\u6210\uFF01'+spLabel+' \u00B7 '+FAM_NAMES[spFamily.family];else if(spState===SP_EFFECT)status=spFamily.rune+' '+spLabel+' \u00B7 '+FAM_NAMES[spFamily.family]+' \u00B7 \u5492\u529B\u6301\u7EED('+(spTimer/spEffectDur*5).toFixed(1)+'s)';else if(spState===SP_FADE)status='\u27F3 \u5492\u529B\u6D88\u6563 \u00B7 '+spTimer.toFixed(1)+'s';ctx.fillStyle=spFamily.clr;ctx.shadowColor=spFamily.clr;ctx.shadowBlur=8;ctx.fillText(status,16,h-36);ctx.shadowBlur=0;if(fontMissingWarn){ctx.font='600 12px '+STATUS_FONT;ctx.fillStyle='rgba(255,140,120,0.85)';ctx.fillText('\u26A0 \u672A\u68C0\u6D4B\u5230\u4E2D\u6587\u5B57\u4F53,\u5492\u8BED\u6587\u5B57\u53EF\u80FD\u65E0\u6CD5\u6B63\u5E38\u6210\u5F62',16,h-54);}}
  else{ctx.font='400 13px '+STATUS_FONT;ctx.fillStyle='rgba(120,110,70,0.5)';ctx.fillText('\u2726 \u8F93\u5165\u5492\u8BED,\u6309\u4E0B\u65BD\u5492 \u00B7 \u7C92\u5B50\u4E16\u754C\u56DE\u5E94\u4F60',16,h-36);}
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
ensureAudio();
})();
</script>
